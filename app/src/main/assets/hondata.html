<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
html, body { width:100vw; height:100vh; overflow:hidden; font-family:'Share Tech Mono',monospace; background:#0a0000; color:#ffffffcc; }

/* ===== TOP BAR ===== */
.top-bar { height:36px; background:#0d0000; border-bottom:1px solid #cc110033; display:flex; align-items:center; padding:0 14px; gap:14px; }
.top-title { font-family:'Orbitron',monospace; font-size:13px; color:#cc2200; letter-spacing:3px; }
.top-conn { display:flex; align-items:center; gap:6px; margin-left:auto; }
.conn-dot { width:8px; height:8px; border-radius:50%; background:#333; }
.conn-dot.live { background:#00ff41; box-shadow:0 0 8px #00ff41; }
.conn-label { font-size:10px; color:#ffffff44; letter-spacing:2px; }

/* ===== SUB NAV ===== */
.sub-nav { height:32px; background:#0a0000; border-bottom:1px solid #cc110022; display:flex; align-items:center; padding:0 10px; gap:2px; }
.sub-btn { background:transparent; border:1px solid transparent; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; color:#ffffff33; padding:4px 12px; cursor:pointer; transition:all 0.15s; }
.sub-btn:hover { color:#ffffff66; border-color:#cc110033; }
.sub-btn.active { color:#cc2200; border-color:#cc220066; background:rgba(204,34,0,0.06); }

/* ===== CONTENT AREA ===== */
.content { position:fixed; top:68px; left:0; right:0; bottom:0; overflow:hidden; }
.tab-panel { display:none; width:100%; height:100%; overflow-y:auto; overflow-x:hidden; }
.tab-panel.active { display:block; }

/* ===== SECTION HELPERS ===== */
.section { padding:16px; border-bottom:1px solid #cc110015; }
.section-title { font-family:'Orbitron',monospace; font-size:12px; color:#cc2200; letter-spacing:3px; margin-bottom:12px; }
.section-sub { font-size:10px; color:#ffffff22; letter-spacing:1px; margin-top:-8px; margin-bottom:12px; }
.pill { font-size:9px; letter-spacing:2px; padding:2px 8px; border:1px solid; display:inline-block; }
.pill-green { color:#00ff41; border-color:#00ff4133; }
.pill-red { color:#ff2200; border-color:#ff220033; }
.pill-yellow { color:#ffcc00; border-color:#ffcc0033; }
.pill-blue { color:#4488ff; border-color:#4488ff33; }
.pill-dim { color:#ffffff33; border-color:#ffffff11; }

/* ===== BUTTONS ===== */
.btn { background:transparent; border:1px solid #cc220044; color:#cc220088; font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:2px; padding:8px 16px; cursor:pointer; transition:all 0.15s; }
.btn:hover { border-color:#cc2200; color:#cc2200; }
.btn.disabled { opacity:0.3; pointer-events:none; }
.btn-danger { border-color:#ff220044; color:#ff220088; }
.btn-danger:hover { border-color:#ff2200; color:#ff2200; }
.btn-success { border-color:#00ff4144; color:#00ff4188; }
.btn-success:hover { border-color:#00ff41; color:#00ff41; }

/* ================================================================
   TAB 1: TABLES — Fuel & Ignition Heatmap Editor
   ================================================================ */
.table-toolbar { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid #cc110015; flex-wrap:wrap; }
.table-select { background:#0d0000; border:1px solid #cc220044; color:#cc2200; font-family:'Share Tech Mono',monospace; font-size:11px; padding:4px 8px; letter-spacing:1px; }
.table-select option { background:#0a0000; color:#ffffffcc; }
.table-info { font-size:10px; color:#ffffff33; letter-spacing:1px; margin-left:auto; }

.heatmap-wrap { padding:8px 16px 16px; overflow-x:auto; }
.heatmap-container { position:relative; }
.heatmap-label-y { position:absolute; left:0; width:48px; text-align:right; font-size:9px; color:#ffffff44; letter-spacing:1px; }
.heatmap-label-x { text-align:center; font-size:9px; color:#ffffff44; letter-spacing:1px; }
.heatmap-table { border-collapse:collapse; margin-left:52px; }
.heatmap-table td { width:44px; height:28px; text-align:center; font-size:10px; font-family:'Share Tech Mono',monospace; border:1px solid #ffffff08; cursor:pointer; transition:all 0.1s; position:relative; }
.heatmap-table td { cursor:default; }
.heatmap-table td.modified { font-weight:bold; }
.heatmap-table td.modified::after { content:''; position:absolute; top:2px; right:2px; width:4px; height:4px; background:#ffcc00; border-radius:50%; }
.heatmap-axis-row td { background:transparent !important; color:#ffffff44; font-size:9px; letter-spacing:1px; border:none !important; cursor:default; }
.heatmap-axis-col { background:transparent !important; color:#ffffff44; font-size:9px; letter-spacing:1px; border:none !important; width:48px !important; cursor:default; }

/* Cell editor popup */
.cell-editor { display:none; position:fixed; background:#111; border:1px solid #cc2200; padding:12px; z-index:100; min-width:160px; }
.cell-editor.show { display:block; }
.cell-editor-title { font-size:10px; color:#ffffff44; letter-spacing:2px; margin-bottom:8px; }
.cell-editor input { width:100%; background:#0a0000; border:1px solid #cc220044; color:#cc2200; font-family:'Orbitron',monospace; font-size:16px; padding:6px; text-align:center; outline:none; }
.cell-editor input:focus { border-color:#cc2200; }
.cell-editor-btns { display:flex; gap:6px; margin-top:8px; }
.cell-editor-btns .btn { flex:1; padding:4px 8px; font-size:10px; }

/* ================================================================
   TAB 2: DTC — Diagnostic Trouble Codes
   ================================================================ */
.dtc-status-bar { display:flex; align-items:center; gap:12px; padding:14px 16px; border-bottom:1px solid #cc110015; }
.dtc-count { font-family:'Orbitron',monospace; font-size:22px; color:#cc2200; }
.dtc-count-label { font-size:10px; color:#ffffff33; letter-spacing:2px; }
.dtc-actions { display:flex; gap:8px; margin-left:auto; }

.dtc-list { padding:8px 16px; }
.dtc-card { border:1px solid #ffffff0a; padding:14px; margin-bottom:8px; background:rgba(10,0,0,0.3); display:flex; gap:14px; align-items:flex-start; }
.dtc-code { font-family:'Orbitron',monospace; font-size:16px; min-width:70px; }
.dtc-body { flex:1; }
.dtc-title { font-size:12px; color:#ffffffbb; margin-bottom:4px; }
.dtc-desc { font-size:10px; color:#ffffff44; line-height:1.6; }
.dtc-meta { display:flex; gap:10px; margin-top:6px; }
.dtc-empty { text-align:center; padding:60px 20px; color:#ffffff22; font-size:12px; letter-spacing:2px; }

/* ================================================================
   TAB 3: DATALOGS — CSV Datalog Viewer
   ================================================================ */
.dl-toolbar { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid #cc110015; flex-wrap:wrap; }
.dl-file-btn { position:relative; overflow:hidden; }
.dl-file-btn input[type=file] { position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer; }
.dl-traces { display:flex; gap:4px; flex-wrap:wrap; }
.dl-trace-btn { background:transparent; border:1px solid #ffffff15; color:#ffffff44; font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px; padding:2px 8px; cursor:pointer; transition:all 0.15s; }
.dl-trace-btn.on { border-color:var(--tc); color:var(--tc); background:rgba(255,255,255,0.03); }

.dl-chart-wrap { position:relative; height:280px; border-bottom:1px solid #cc110015; }
#dl-canvas { width:100%; height:100%; }
.dl-cursor-info { position:absolute; top:8px; right:12px; font-size:10px; color:#ffffff55; pointer-events:none; }

.dl-stats { padding:12px 16px; }
.dl-stats-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:8px; }
.dl-stat-card { border:1px solid #ffffff08; padding:10px; background:rgba(10,0,0,0.3); }
.dl-stat-label { font-size:9px; color:#ffffff33; letter-spacing:2px; margin-bottom:4px; }
.dl-stat-row { display:flex; justify-content:space-between; font-size:10px; }
.dl-stat-val { color:#ffffffaa; }
.dl-stat-unit { color:#ffffff33; }

.dl-empty { text-align:center; padding:80px 20px; color:#ffffff22; }
.dl-empty-icon { font-size:36px; margin-bottom:12px; opacity:0.3; }
.dl-empty-text { font-size:12px; letter-spacing:2px; }

/* ================================================================
   TAB 4: FLASH — Calibration Manager
   ================================================================ */
.flash-slots { padding:16px; display:flex; flex-direction:column; gap:10px; }
.flash-slot { border:1px solid #ffffff0a; padding:16px; background:rgba(10,0,0,0.3); display:flex; align-items:center; gap:14px; cursor:pointer; transition:all 0.15s; }
.flash-slot:hover { border-color:#cc220044; }
.flash-slot.active-slot { border-color:#cc2200; background:rgba(204,34,0,0.06); }
.flash-slot-num { font-family:'Orbitron',monospace; font-size:24px; color:#ffffff22; min-width:40px; text-align:center; }
.flash-slot.active-slot .flash-slot-num { color:#cc2200; }
.flash-slot-info { flex:1; }
.flash-slot-name { font-size:13px; color:#ffffffcc; letter-spacing:1px; margin-bottom:4px; }
.flash-slot-desc { font-size:10px; color:#ffffff33; line-height:1.5; }
.flash-slot-meta { display:flex; gap:8px; margin-top:6px; }
.flash-slot-actions { display:flex; flex-direction:column; gap:6px; }

.flash-progress { display:none; margin:0 16px; padding:16px; border:1px solid #cc220033; background:rgba(204,34,0,0.04); }
.flash-progress.show { display:block; }
.flash-progress-title { font-size:11px; color:#cc2200; letter-spacing:2px; margin-bottom:10px; }
.flash-progress-bar { height:6px; background:#ffffff0a; margin-bottom:8px; }
.flash-progress-fill { height:6px; background:#cc2200; width:0%; transition:width 0.3s; }
.flash-progress-status { font-size:10px; color:#ffffff44; letter-spacing:1px; }

.flash-compare { padding:16px; display:none; }
.flash-compare.show { display:block; }
.flash-compare-grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:#ffffff08; }
.flash-compare-cell { padding:10px; background:#0a0000; }
.flash-compare-header { font-size:10px; color:#ffffff33; letter-spacing:2px; text-align:center; padding:8px; background:#0d0000; }
.flash-compare-param { font-size:10px; color:#ffffff44; }
.flash-compare-val { font-size:13px; color:#ffffffaa; margin-top:2px; }
.flash-compare-diff { color:#ffcc00; }

/* ================================================================
   TAB 5: SENSORS — Real-time Sensor Dashboard
   ================================================================ */
.sensor-grid { padding:12px; display:grid; grid-template-columns:repeat(auto-fill, minmax(170px, 1fr)); gap:8px; }
.sensor-card { border:1px solid #ffffff08; padding:12px; background:rgba(10,0,0,0.3); }
.sensor-label { font-size:9px; color:#ffffff33; letter-spacing:2px; margin-bottom:4px; display:flex; justify-content:space-between; }
.sensor-val { font-family:'Orbitron',monospace; font-size:22px; font-weight:700; line-height:1.1; }
.sensor-bar { height:3px; background:#ffffff0a; margin-top:6px; border-radius:1px; }
.sensor-fill { height:3px; border-radius:1px; transition:width 0.15s; }
.sensor-range { display:flex; justify-content:space-between; font-size:8px; color:#ffffff22; margin-top:3px; }
.sensor-group-title { grid-column:1/-1; font-family:'Orbitron',monospace; font-size:11px; color:#cc2200; letter-spacing:3px; padding:8px 4px 0; border-top:1px solid #cc110022; }
.sensor-group-title:first-child { border-top:none; }

/* ================================================================
   TAB 6: REFERENCE — FlashPro Documentation Library
   ================================================================ */
.ref-header { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid #cc110015; flex-wrap:wrap; }
.ref-search { flex:1; min-width:200px; background:#0d0000; border:1px solid #cc220044; color:#ffffffcc; font-family:'Share Tech Mono',monospace; font-size:12px; padding:8px 12px; outline:none; letter-spacing:1px; }
.ref-search:focus { border-color:#cc2200; }
.ref-search::placeholder { color:#ffffff22; letter-spacing:2px; }
.ref-cat-bar { display:flex; gap:2px; padding:8px 16px; border-bottom:1px solid #cc110015; flex-wrap:wrap; }
.ref-cat-btn { background:transparent; border:1px solid transparent; font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px; color:#ffffff33; padding:4px 10px; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
.ref-cat-btn:hover { color:#ffffff66; border-color:#cc110033; }
.ref-cat-btn.active { color:#cc2200; border-color:#cc220066; background:rgba(204,34,0,0.06); }
.ref-cat-count { font-size:8px; color:#ffffff22; margin-left:4px; }

.ref-list { padding:8px 16px; }
.ref-card { border:1px solid #ffffff08; padding:14px; margin-bottom:8px; background:rgba(10,0,0,0.3); cursor:pointer; transition:all 0.15s; }
.ref-card:hover { border-color:#cc220044; background:rgba(20,0,0,0.4); }
.ref-card.expanded { border-color:#cc220066; }
.ref-card-head { display:flex; align-items:center; gap:10px; }
.ref-card-name { font-family:'Orbitron',monospace; font-size:14px; color:#cc2200; }
.ref-card-full { font-size:11px; color:#ffffff88; }
.ref-card-pills { display:flex; gap:6px; margin-left:auto; flex-wrap:wrap; }
.ref-card-body { display:none; margin-top:12px; padding-top:12px; border-top:1px solid #cc110022; }
.ref-card.expanded .ref-card-body { display:block; }
.ref-card-desc { font-size:11px; color:#ffffff88; line-height:1.7; margin-bottom:10px; }
.ref-card-detail { display:flex; gap:8px; margin-bottom:6px; align-items:flex-start; }
.ref-card-detail-label { font-size:9px; color:#ffffff33; letter-spacing:2px; min-width:70px; padding-top:2px; }
.ref-card-detail-val { font-size:11px; color:#ffffffaa; line-height:1.5; }
.ref-card-tip { font-size:10px; color:#ffcc00aa; padding:4px 0 4px 12px; border-left:2px solid #ffcc0033; margin:4px 0; }
.ref-card-items { margin-top:8px; }
.ref-card-item { font-size:10px; color:#ffffff66; padding:4px 8px; border-left:2px solid #cc220033; margin:4px 0; line-height:1.5; }
.ref-card-item-name { color:#cc2200; font-size:11px; }
.ref-empty { text-align:center; padding:60px 20px; color:#ffffff22; font-size:12px; letter-spacing:2px; }
.ref-results-count { font-size:10px; color:#ffffff22; letter-spacing:1px; padding:4px 16px; }

/* ================================================================
   TAB: CALIBRATION — Parameter Editor
   ================================================================ */
.cal-wrap { padding:8px 16px 60px; }
.cal-group { border:1px solid #ffffff08; margin-bottom:6px; background:rgba(10,0,0,0.3); }
.cal-group-header { display:flex; align-items:center; gap:10px; padding:12px 14px; cursor:pointer; transition:all 0.15s; border-bottom:1px solid transparent; }
.cal-group-header:hover { background:rgba(204,34,0,0.04); }
.cal-group.open .cal-group-header { border-bottom:1px solid #cc110022; }
.cal-group-arrow { font-size:10px; color:#cc220088; transition:transform 0.2s; }
.cal-group.open .cal-group-arrow { transform:rotate(90deg); }
.cal-group-name { font-family:'Orbitron',monospace; font-size:11px; color:#cc2200; letter-spacing:3px; }
.cal-group-count { font-size:9px; color:#ffffff22; letter-spacing:1px; margin-left:auto; }
.cal-group-body { display:none; }
.cal-group.open .cal-group-body { display:block; }
.cal-row { display:flex; align-items:center; padding:8px 14px 8px 28px; border-bottom:1px solid #ffffff05; transition:background 0.1s; }
.cal-row:last-child { border-bottom:none; }
.cal-row:hover { background:rgba(204,34,0,0.03); }
.cal-row-name { flex:1; font-size:11px; color:#ffffff88; letter-spacing:0.5px; }
.cal-row-val { font-family:'Share Tech Mono',monospace; font-size:12px; color:#ffffffcc; padding:3px 8px; border:1px solid transparent; cursor:pointer; transition:all 0.15s; min-width:60px; text-align:right; }
.cal-row-val:hover { border-color:#cc220044; background:rgba(204,34,0,0.06); }
.cal-row-val.editing { border-color:#cc2200; background:#0d0000; outline:none; color:#cc2200; -webkit-user-select:text; user-select:text; }
.cal-row-unit { font-size:9px; color:#ffffff33; letter-spacing:1px; min-width:50px; padding-left:6px; }
.cal-row-mod { width:6px; height:6px; border-radius:50%; margin-left:8px; flex-shrink:0; }
.cal-row-mod.changed { background:#ffcc00; box-shadow:0 0 6px #ffcc0044; }
.cal-toolbar { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid #cc110015; }
.cal-search { flex:1; min-width:140px; background:#0d0000; border:1px solid #cc220044; color:#ffffffcc; font-family:'Share Tech Mono',monospace; font-size:11px; padding:6px 10px; outline:none; letter-spacing:1px; }
.cal-search:focus { border-color:#cc2200; }
.cal-search::placeholder { color:#ffffff22; letter-spacing:2px; }
.cal-mod-count { font-size:10px; color:#ffcc00; letter-spacing:1px; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#cc220033; }
::-webkit-scrollbar-thumb:hover { background:#cc220066; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <span class="top-title">FLASHPRO MANAGER</span>
  <span style="font-size:8px;letter-spacing:2px;color:#00ff41;border:1px solid #00ff4144;padding:2px 7px;margin-left:6px;vertical-align:middle;">READ ONLY</span>
  <span style="font-size:10px;color:#ffffff22;letter-spacing:1px;">K20Z3 // FA5</span>
  <div class="top-conn">
    <div class="conn-dot" id="fp-conn-dot"></div>
    <span class="conn-label" id="fp-conn-label">NOT CONNECTED</span>
  </div>
</div>

<!-- SUB NAV -->
<div class="sub-nav">
  <button class="sub-btn active" onclick="switchTab('tables')">TABLES</button>
  <button class="sub-btn" onclick="switchTab('calibration')">CALIBRATION</button>
  <button class="sub-btn" onclick="switchTab('dtc')">DTC</button>
  <button class="sub-btn" onclick="switchTab('datalogs')">DATALOGS</button>
  <button class="sub-btn" onclick="switchTab('sensors')">SENSORS</button>
  <button class="sub-btn" onclick="switchTab('multi')">MULTI</button>
  <button class="sub-btn" onclick="switchTab('reference')">REFERENCE</button>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- ============================================================
       TAB: TABLES — Fuel & Ignition Heatmap Editor
       ============================================================ -->
  <div class="tab-panel active" id="panel-tables">
    <div class="table-toolbar">
      <select class="table-select" id="table-selector" onchange="loadTable(this.value)">
        <option value="fuel_lo">FUEL — LOW CAM</option>
        <option value="fuel_hi">FUEL — HIGH CAM (VTEC)</option>
        <option value="ign_lo">IGNITION — LOW CAM</option>
        <option value="ign_hi">IGNITION — HIGH CAM (VTEC)</option>
        <option value="cam_lo">CAM ANGLE — LOW CAM</option>
        <option value="cam_hi">CAM ANGLE — HIGH CAM (VTEC)</option>
      </select>
      <span class="pill pill-blue" id="table-map-label">MAP 1 — STREET</span>
      <span class="table-info" id="table-info">VIEW MODE</span>
    </div>
    <div class="heatmap-wrap" id="heatmap-wrap"></div>
  </div>

  <!-- ============================================================
       TAB: CALIBRATION — Parameter Editor
       ============================================================ -->
  <div class="tab-panel" id="panel-calibration">
    <div class="cal-toolbar">
      <input class="cal-search" type="text" placeholder="SEARCH PARAMETERS..." id="cal-search" oninput="filterCalParams(this.value)">
      <span style="font-size:9px;color:#ffffff33;letter-spacing:1px;">VIEW ONLY — Use FlashPro Manager to modify parameters</span>
    </div>
    <div class="cal-wrap" id="cal-wrap"></div>
  </div>

  <!-- ============================================================
       TAB: DTC — Diagnostic Trouble Codes
       ============================================================ -->
  <div class="tab-panel" id="panel-dtc">
    <div class="dtc-status-bar">
      <div>
        <div class="dtc-count" id="dtc-count">0</div>
        <div class="dtc-count-label">ACTIVE CODES</div>
      </div>
      <div style="margin-left:20px;">
        <div class="dtc-count" id="dtc-pending-count" style="font-size:16px;color:#ffcc00;">0</div>
        <div class="dtc-count-label">PENDING</div>
      </div>
      <div class="dtc-actions">
        <button class="btn" onclick="scanDTC()">SCAN</button>
        <button class="btn btn-danger" onclick="clearDTC()">CLEAR ALL</button>
      </div>
    </div>
    <div class="dtc-list" id="dtc-list">
      <div class="dtc-empty" id="dtc-empty">
        TAP SCAN TO READ DIAGNOSTIC TROUBLE CODES
      </div>
    </div>
  </div>

  <!-- ============================================================
       TAB: DATALOGS — CSV Viewer
       ============================================================ -->
  <div class="tab-panel" id="panel-datalogs">
    <div class="dl-toolbar">
      <div class="btn dl-file-btn">
        LOAD CSV
        <input type="file" accept=".csv" onchange="loadDatalog(this.files[0])">
      </div>
      <span class="conn-label" id="dl-filename">NO FILE LOADED</span>
      <div class="dl-traces" id="dl-traces"></div>
    </div>
    <div class="dl-chart-wrap" id="dl-chart-wrap">
      <canvas id="dl-canvas"></canvas>
      <div class="dl-cursor-info" id="dl-cursor-info"></div>
      <div class="dl-empty" id="dl-empty">
        <div class="dl-empty-icon">&#9776;</div>
        <div class="dl-empty-text">LOAD A CSV DATALOG TO ANALYZE</div>
      </div>
    </div>
    <div class="dl-stats" id="dl-stats" style="display:none;">
      <div class="section-title">STATISTICS</div>
      <div class="dl-stats-grid" id="dl-stats-grid"></div>
    </div>
  </div>

  <!-- ============================================================
       TAB: SENSORS — Real-time Dashboard
       ============================================================ -->
  <div class="tab-panel" id="panel-sensors">
    <div class="sensor-grid" id="sensor-grid"></div>
  </div>

  <!-- ============================================================
       TAB: MULTI — Multi-System Stream
       ============================================================ -->
  <div class="tab-panel" id="panel-multi">
    <iframe id="multi-frame" style="width:100%;height:100%;border:none;" src="about:blank"></iframe>
  </div>

  <!-- ============================================================
       TAB: REFERENCE — FlashPro Documentation Library
       ============================================================ -->
  <div class="tab-panel" id="panel-reference">
    <div class="ref-header">
      <input class="ref-search" id="ref-search" type="text" placeholder="SEARCH SENSORS, PARAMETERS, TUNING..." oninput="filterReference()">
    </div>
    <div class="ref-cat-bar" id="ref-cat-bar"></div>

const RPM_AXIS  = [500, 1000, 1500, 2000, 2500, 3000, 3500, 4000, 4500, 5000, 5500, 6000, 6500, 7000, 7500, 8000];
const MAP_AXIS = [20, 30, 40, 50, 60, 70, 80, 90, 100, 110, 120];

// K20Z3-realistic calibration tables (310cc injectors stock)
function generateFuelTable(cam) {
  const t = [];
  for (let l = 0; l < MAP_AXIS.length; l++) {
    const row = [];
    for (let r = 0; r < RPM_AXIS.length; r++) {
      const kpa = MAP_AXIS[l], rpm = RPM_AXIS[r];
      let ms;
      // Base injector duration scales with load (kPa) and RPM
      const loadFrac = kpa / 100;
      const rpmFrac = rpm / 8000;
      if (cam === 'hi') {
        // High cam (VTEC) — more airflow, needs more fuel
        ms = 1.2 + loadFrac * 5.5 + rpmFrac * 3.5;
        if (kpa >= 100) ms += 1.8 + rpmFrac * 1.2; // WOT enrichment
        if (rpm >= 6000 && kpa >= 90) ms += 0.8;
        if (rpm >= 7000) ms += 0.5;
      } else {
        // Low cam — less aggressive
        ms = 1.0 + loadFrac * 4.8 + rpmFrac * 2.5;
        if (kpa >= 100) ms += 1.2 + rpmFrac * 0.8;
        if (rpm >= 5000 && kpa >= 90) ms += 0.5;
      }
      // Idle: short pulse
      if (rpm <= 1000 && kpa <= 40) ms = Math.min(ms, 2.2);
      row.push(Math.round(ms * 100) / 100);
    }
    t.push(row);
  }
  return t;
}

function generateIgnTable(cam) {
  const t = [];
  for (let l = 0; l < MAP_AXIS.length; l++) {
    const row = [];
    for (let r = 0; r < RPM_AXIS.length; r++) {
      const kpa = MAP_AXIS[l], rpm = RPM_AXIS[r];
      let deg;
      const loadFrac = kpa / 100;
      const rpmFrac = rpm / 8000;
      if (cam === 'hi') {
        // High cam: more aggressive timing, pull at high load/RPM
        deg = 10 + rpmFrac * 30 - loadFrac * 12;
        if (kpa >= 100) deg -= 6;  // WOT retard for safety
        if (rpm >= 7000) deg -= 4; // High RPM retard
        if (rpm <= 1500) deg = Math.min(deg, 15);
      } else {
        // Low cam: more conservative
        deg = 8 + rpmFrac * 26 - loadFrac * 10;
        if (kpa >= 100) deg -= 5;
        if (rpm <= 1500) deg = Math.min(deg, 12);
      }
      row.push(Math.round(Math.max(-5, Math.min(45, deg)) * 10) / 10);
    }
    t.push(row);
  }
  return t;
}

function generateCamTable(cam) {
  const t = [];
  for (let l = 0; l < MAP_AXIS.length; l++) {
    const row = [];
    for (let r = 0; r < RPM_AXIS.length; r++) {
      const kpa = MAP_AXIS[l], rpm = RPM_AXIS[r];
      let deg;
      const loadFrac = kpa / 100;
      if (cam === 'hi') {
        // High cam angle: aggressive advance mid-range, retard at top
        if (rpm <= 1000) deg = 2 + loadFrac * 3;
        else if (rpm <= 3000) deg = 5 + (rpm - 1000) / 2000 * 20 + loadFrac * 8;
        else if (rpm <= 5500) deg = 25 + (rpm - 3000) / 2500 * 20 + loadFrac * 5;
        else if (rpm <= 7000) deg = 40 + (rpm - 5500) / 1500 * 10;
        else deg = 50 - (rpm - 7000) / 1000 * 25; // Retard above 7000
      } else {
        // Low cam angle: moderate advance
        if (rpm <= 1000) deg = 0 + loadFrac * 2;
        else if (rpm <= 3000) deg = 2 + (rpm - 1000) / 2000 * 13 + loadFrac * 5;
        else if (rpm <= 5500) deg = 15 + (rpm - 3000) / 2500 * 15 + loadFrac * 3;
        else deg = 30 - (rpm - 5500) / 2500 * 10;
      }
      row.push(Math.round(Math.max(0, Math.min(50, deg)) * 10) / 10);
    }
    t.push(row);
  }
  return t;
}

const TABLES = {
  fuel_lo: { data: generateFuelTable('lo'), orig: null, unit: 'ms', label: 'FUEL — LOW CAM' },
  fuel_hi: { data: generateFuelTable('hi'), orig: null, unit: 'ms', label: 'FUEL — HIGH CAM (VTEC)' },

function loadTable(key) {

function renderHeatmap() {
  const wrap = document.getElementById('heatmap-wrap');
  const t = TABLES[activeTable];
  const data = t.data;
  const isFuel = activeTable.startsWith('fuel');
  const isCam = activeTable.startsWith('cam');
  const colorFn = isFuel ? heatColor : (isCam ? camColor : ignColor);

  // Find min/max for color scaling
  let allVals = data.flat();
  const mn = Math.min(...allVals), mx = Math.max(...allVals);

  let html = '<table class="heatmap-table">';

  // X axis header (RPM)
  html += '<tr class="heatmap-axis-row"><td class="heatmap-axis-col">RPM \\ kPa</td>';
  RPM_AXIS.forEach(rpm => { html += '<td>' + rpm + '</td>'; });
  html += '</tr>';

  // Data rows
  for (let l = 0; l < MAP_AXIS.length; l++) {
    html += '<tr><td class="heatmap-axis-col">' + MAP_AXIS[l] + ' kPa</td>';
    for (let r = 0; r < RPM_AXIS.length; r++) {
      const v = data[l][r];
      const orig = t.orig[l][r];
      const norm = (v - mn) / (mx - mn || 1);
      const color = colorFn(norm);
      const modified = (Math.abs(v - orig) > 0.01) ? ' modified' : '';
      const sel = (selectedCell && selectedCell[0] === l && selectedCell[1] === r) ? ' selected' : '';
      html += '<td style="background:' + color + ';color:#000">' + v.toFixed(isFuel ? 2 : 1) + '</td>';
    }
    html += '</tr>';
  }
  html += '</table>';
  wrap.innerHTML = html;
}

function camColor(n) {
  // Blue (no advance) -> Cyan -> Green -> Yellow (max advance)
  if (n < 0.25) return 'rgba(40,80,200,' + (0.3 + n * 2) + ')';
  if (n < 0.5)  return 'rgba(40,180,200,' + (0.3 + n * 1.2) + ')';
  if (n < 0.75) return 'rgba(40,180,80,' + (0.3 + n * 0.8) + ')';
  return 'rgba(220,180,20,' + (0.3 + n * 0.7) + ')';
}

function heatColor(n) {
  // Blue (lean/low) -> Green -> Yellow -> Red (rich/high)
  if (n < 0.25) return 'rgba(40,80,200,' + (0.3 + n * 2) + ')';
  if (n < 0.5)  return 'rgba(40,180,80,' + (0.3 + n * 1.2) + ')';
  if (n < 0.75) return 'rgba(220,180,20,' + (0.3 + n * 0.8) + ')';
  return 'rgba(220,50,20,' + (0.3 + n * 0.7) + ')';
}

function ignColor(n) {
  // Red (retarded) -> Yellow -> Green -> Cyan (advanced)
  if (n < 0.25) return 'rgba(200,40,40,' + (0.3 + n * 2) + ')';
  if (n < 0.5)  return 'rgba(200,160,20,' + (0.3 + n * 1.2) + ')';
  if (n < 0.75) return 'rgba(40,180,80,' + (0.3 + n * 0.8) + ')';
  return 'rgba(40,180,200,' + (0.3 + n * 0.7) + ')';
}

function selectCell(l, r) {
  selectedCell = [l, r];
  const t = TABLES[activeTable];
  const v = t.data[l][r];
  const orig = t.orig[l][r];
  const diff = v - orig;
  let info = MAP_AXIS[l] + ' kPa / ' + RPM_AXIS[r] + ' RPM = ' + v.toFixed(2) + ' ' + t.unit;
  if (Math.abs(diff) > 0.01) info += ' (' + (diff > 0 ? '+' : '') + diff.toFixed(2) + ')';
  document.getElementById('table-info').textContent = info;
  renderHeatmap();
}

function scanDTC() {

  const numActive = Math.floor(Math.random() * 4) + 1;

let dlData = null; // { headers:[], rows:[[]], params:{} }
let dlTraces = {};
const DL_COLORS = ['#00cc88','#cc2200','#ff8844','#ffff44','#4488ff','#aa88ff','#44ffcc','#ffaa00','#88ff44','#ff44aa','#44aaff'];

function loadDatalog(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const lines = text.trim().split('\n');
    if (lines.length < 2) return;

    const headers = lines[0].split(',').map(h => h.trim());
    const rows = [];
    for (let i = 1; i < lines.length; i++) {
      const vals = lines[i].split(',').map(v => parseFloat(v.trim()));
      if (vals.length === headers.length) rows.push(vals);
    }

    dlData = { headers, rows };

    // Build trace toggles
    dlTraces = {};
    const container = document.getElementById('dl-traces');
    container.innerHTML = '';
    headers.forEach((h, i) => {
      if (h.toLowerCase().includes('time')) return; // skip time column
      const color = DL_COLORS[Object.keys(dlTraces).length % DL_COLORS.length];
      dlTraces[i] = { name: h, color, visible: Object.keys(dlTraces).length < 4, colIdx: i };
      const btn = document.createElement('button');
      btn.className = 'dl-trace-btn' + (dlTraces[i].visible ? ' on' : '');
      btn.style.cssText = '--tc:' + color;
      btn.textContent = h.toUpperCase();
      btn.onclick = function() { dlTraces[i].visible = !dlTraces[i].visible; btn.classList.toggle('on'); renderDLChart(); };
      container.appendChild(btn);
    });

    document.getElementById('dl-filename').textContent = file.name + ' (' + rows.length + ' samples)';
    document.getElementById('dl-empty').style.display = 'none';
    document.getElementById('dl-stats').style.display = 'block';
    resizeDLCanvas();
    renderDLChart();
    renderDLStats();
  };
  reader.readAsText(file);
}

const dlCanvas = document.getElementById('dl-canvas');
const dlCtx = dlCanvas.getContext('2d');
let dlW, dlH;

function resizeDLCanvas() {
  const wrap = document.getElementById('dl-chart-wrap');
  const dpr = window.devicePixelRatio || 1;
  dlW = wrap.offsetWidth;
  dlH = wrap.offsetHeight;
  dlCanvas.width = dlW * dpr;
  dlCanvas.height = dlH * dpr;
  dlCtx.scale(dpr, dpr);
  dlCanvas.style.width = dlW + 'px';
  dlCanvas.style.height = dlH + 'px';
  if (dlData) renderDLChart();
}

function renderDLChart() {
  if (!dlData) return;
  dlCtx.clearRect(0, 0, dlW, dlH);

  const pad = { l: 50, r: 12, t: 12, b: 24 };
  const gw = dlW - pad.l - pad.r, gh = dlH - pad.t - pad.b;
  const rows = dlData.rows;
  const n = rows.length;
  if (n < 2) return;

  // Grid
  dlCtx.strokeStyle = '#ffffff08'; dlCtx.lineWidth = 1;
  for (let i = 0; i <= 5; i++) {
    const y = pad.t + (i / 5) * gh;
    dlCtx.beginPath(); dlCtx.moveTo(pad.l, y); dlCtx.lineTo(pad.l + gw, y); dlCtx.stroke();
  }

  // Draw each visible trace (normalized to its own min/max)
  Object.values(dlTraces).forEach(tr => {
    if (!tr.visible) return;
    const col = tr.colIdx;
    let mn = Infinity, mx = -Infinity;
    rows.forEach(r => { mn = Math.min(mn, r[col]); mx = Math.max(mx, r[col]); });
    if (mx === mn) mx = mn + 1;

    dlCtx.beginPath();
    dlCtx.strokeStyle = tr.color;
    dlCtx.lineWidth = 1.5;
    dlCtx.shadowColor = tr.color;
    dlCtx.shadowBlur = 3;

    for (let i = 0; i < n; i++) {
      const x = pad.l + (i / (n - 1)) * gw;
      const norm = (rows[i][col] - mn) / (mx - mn);
      const y = pad.t + (1 - norm) * gh;
      if (i === 0) dlCtx.moveTo(x, y); else dlCtx.lineTo(x, y);
    }
    dlCtx.stroke();
    dlCtx.shadowBlur = 0;

    // Label at end
    const lastNorm = (rows[n - 1][col] - mn) / (mx - mn);
    const lastY = pad.t + (1 - lastNorm) * gh;
    dlCtx.fillStyle = tr.color;
    dlCtx.font = 'bold 9px Share Tech Mono';
    dlCtx.textAlign = 'right';
    dlCtx.fillText(tr.name + ' ' + rows[n - 1][col].toFixed(1), pad.l + gw - 2, Math.max(pad.t + 10, Math.min(pad.t + gh - 2, lastY - 4)));
  });

  // Time axis
  dlCtx.fillStyle = '#ffffff22'; dlCtx.font = '9px Share Tech Mono'; dlCtx.textAlign = 'center';
  const timeCol = dlData.headers.findIndex(h => h.toLowerCase().includes('time'));
  if (timeCol >= 0) {
    for (let i = 0; i <= 5; i++) {
      const idx = Math.floor((i / 5) * (n - 1));
      const t = rows[idx][timeCol];
      const label = t > 1000 ? (t / 1000).toFixed(1) + 's' : t + 'ms';
      dlCtx.fillText(label, pad.l + (i / 5) * gw, pad.t + gh + 16);
    }
  }
}

function renderDLStats() {
  if (!dlData) return;
  const grid = document.getElementById('dl-stats-grid');
  let html = '';
  Object.values(dlTraces).forEach(tr => {
    const col = tr.colIdx;
    const vals = dlData.rows.map(r => r[col]);
    const mn = Math.min(...vals), mx = Math.max(...vals);
    const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
    html += '<div class="dl-stat-card"><div class="dl-stat-label" style="color:' + tr.color + '">' + tr.name.toUpperCase() + '</div>' +
      '<div class="dl-stat-row"><span class="dl-stat-unit">MIN</span><span class="dl-stat-val">' + mn.toFixed(2) + '</span></div>' +
      '<div class="dl-stat-row"><span class="dl-stat-unit">MAX</span><span class="dl-stat-val">' + mx.toFixed(2) + '</span></div>' +
      '<div class="dl-stat-row"><span class="dl-stat-unit">AVG</span><span class="dl-stat-val">' + avg.toFixed(2) + '</span></div></div>';
  });
  grid.innerHTML = html;
}

// ================================================================
//  SENSOR SIMULATION
// ================================================================
let simT = 0;
let simCamActual = 0; // Tracks actual cam position (lags command)
const jit = (v, a) => v + (Math.random() - 0.5) * a;

function simSensors() {
  simT++;
  const phase = simT % 600;
  let tRPM, tTPS;
  // Drive cycle: idle -> cruise -> pull -> WOT -> coast -> cruise -> pull -> decel -> idle
  if (phase < 60)       { tRPM = 750;  tTPS = 0; }    // Idle warmup
  else if (phase < 150) { tRPM = 3200; tTPS = 30; }   // Cruise 3rd gear
  else if (phase < 200) { tRPM = 5200; tTPS = 65; }   // Accelerating
  else if (phase < 280) { tRPM = 7200; tTPS = 100; }  // WOT pull through VTEC
  else if (phase < 320) { tRPM = 6800; tTPS = 85; }   // Holding high RPM
  else if (phase < 380) { tRPM = 2800; tTPS = 8; }    // Decel / coast
  else if (phase < 430) { tRPM = 4500; tTPS = 50; }   // Mid-range cruise
  else if (phase < 500) { tRPM = 6500; tTPS = 80; }   // Spirited driving
  else if (phase < 540) { tRPM = 2000; tTPS = 5; }    // Slowing down
  else                  { tRPM = 750;  tTPS = 0; }     // Back to idle

  const sd = (id) => SENSOR_DEFS.find(s => s.id === id);

  // RPM with realistic slew rate
  const rpm = sd('rpm'); rpm.val += (tRPM - rpm.val) * 0.08 + jit(0, 30); rpm.val = Math.max(650, Math.min(8500, rpm.val));
  const curRPM = rpm.val;

  // Throttle pedal and plate (plate lags pedal slightly due to drive-by-wire)
  const tpedal = sd('tpedal'); tpedal.val += (tTPS - tpedal.val) * 0.15; tpedal.val = Math.max(0, Math.min(100, tpedal.val));
  const tplate = sd('tplate'); tplate.val += (tpedal.val * 0.95 - tplate.val) * 0.10; tplate.val = Math.max(0, Math.min(100, tplate.val));

  // MAP: idle ~35 kPa, cruise ~50-70 kPa, WOT 100+ kPa
  const tMAP = tTPS <= 2 ? 35 : (35 + tplate.val * 0.85 + (curRPM > 5000 ? 10 : 0));
  sd('map_s').val += (Math.min(255, tMAP) - sd('map_s').val) * 0.12 + jit(0, 1.5);
  sd('map_s').val = Math.max(20, Math.min(255, sd('map_s').val));
  const curMAP = sd('map_s').val;

  // Vehicle speed (approximate from RPM/gear)
  let tGear = 0;
  if (curRPM < 800 && tTPS < 2) tGear = 0;
  else if (curRPM < 2500) tGear = 2;
  else if (curRPM < 4000) tGear = 3;
  else if (curRPM < 6000) tGear = 4;
  else tGear = tTPS > 60 ? 3 : 5;
  sd('gear').val = tGear;

  const gearRatio = [0, 3.27, 2.11, 1.47, 1.10, 0.86, 0.73][tGear] || 0;
  const finalDrive = 4.76;
  const tireCirc = 0.00124; // miles per revolution (205/55R16)
  const tVSS = tGear > 0 ? (curRPM / (gearRatio * finalDrive)) * tireCirc * 60 : 0;
  sd('vss').val += (tVSS - sd('vss').val) * 0.08; sd('vss').val = Math.max(0, Math.min(180, sd('vss').val));

  // === VTEC / VTC ===
  const vtecEngaged = curRPM >= 5800;
  sd('vts').val = vtecEngaged ? 1 : 0;

  // Cam command based on RPM/load
  let tCamCmd;
  if (curRPM <= 1000) tCamCmd = jit(2, 1);
  else if (curRPM <= 3000) tCamCmd = 5 + (curRPM - 1000) / 2000 * 15 + (curMAP / 100) * 5;
  else if (curRPM <= 5500) tCamCmd = 20 + (curRPM - 3000) / 2500 * 15 + (curMAP > 80 ? 5 : 0);
  else if (vtecEngaged && curRPM <= 7000) tCamCmd = 35 + (curRPM - 5500) / 1500 * 15;
  else if (vtecEngaged) tCamCmd = 50 - (curRPM - 7000) / 1000 * 25;
  else tCamCmd = 25;
  tCamCmd = Math.max(0, Math.min(50, tCamCmd));
  sd('camcmd').val += (tCamCmd - sd('camcmd').val) * 0.15;

  // Cam actual lags command by 0.1-0.5s (rate of ~3-10 ticks at 100ms)
  simCamActual += (sd('camcmd').val - simCamActual) * 0.06 + jit(0, 0.3);
  simCamActual = Math.max(0, Math.min(50, simCamActual));
  // Lock cam at 0 for first 10 seconds (100 ticks)
  if (simT < 100) simCamActual = jit(0, 0.5);
  sd('cam').val = Math.max(0, simCamActual);

  // === IGNITION ===
  let tIgn;
  if (curRPM <= 1500) tIgn = 12 + jit(0, 0.3);
  else if (curRPM <= 3500) tIgn = 12 + (curRPM - 1500) / 2000 * 20 - (curMAP > 90 ? 4 : 0);
  else if (curRPM <= 6000) tIgn = 32 - (curMAP > 90 ? 6 : 0);
  else if (curRPM <= 7500) tIgn = 28 - (curMAP > 90 ? 5 : 0);
  else tIgn = 24;
  sd('ign').val += (tIgn - sd('ign').val) * 0.12 + jit(0, 0.3);

  // === FUEL ===
  const isWOT = tplate.val > 80;
  const isCL = !isWOT && curRPM > 800 && sd('ect').val > 160;

  // Fuel Status: 1=OL warmup, 2=CL, 4=OL driving, 8=OL error
  if (sd('ect').val < 160) sd('fstat').val = 1;
  else if (isWOT) sd('fstat').val = 4;
  else sd('fstat').val = 2;

  // AFR: 14.7 closed loop, 12.0-12.5 WOT
  let tAFR = isWOT ? jit(12.2, 0.3) : (isCL ? 14.7 : jit(14.2, 0.3));
  sd('afr').val += (tAFR - sd('afr').val) * 0.15 + jit(0, 0.05);
  sd('afr').val = Math.max(10, Math.min(20, sd('afr').val));

  // Injector duration (ms) — scales with RPM and load
  const loadFrac = curMAP / 100;
  let tInj = 1.5 + loadFrac * 4.0 + (curRPM / 8000) * 3.0;
  if (isWOT) tInj += 2.5;
  if (vtecEngaged) tInj += 1.0;
  if (curRPM < 900 && tTPS < 2) tInj = 2.1;
  sd('inj').val += (tInj - sd('inj').val) * 0.12 + jit(0, 0.1);
  sd('inj').val = Math.max(0, Math.min(30, sd('inj').val));

  // Injector duty cycle
  sd('duty').val = Math.min(100, (sd('inj').val / (120000 / curRPM / 2)) * 100);
  if (isNaN(sd('duty').val) || curRPM < 100) sd('duty').val = 0;

  // Air flow meter voltage (scales with airflow)
  sd('afm').val = Math.max(0.5, Math.min(4.8, 0.8 + loadFrac * 2.0 + (curRPM / 8000) * 1.5 + jit(0, 0.05)));

  // Short term fuel trim: -10% to +10% at part throttle, near 0 at WOT
  if (isWOT) { sd('strim').val += (0 - sd('strim').val) * 0.2; }
  else { sd('strim').val = Math.max(-10, Math.min(10, sd('strim').val * 0.95 + jit(0, 0.6))); }

  // Long term fuel trim: -5% to +5%
  sd('ltrim').val = Math.max(-5, Math.min(5, sd('ltrim').val * 0.998 + jit(0, 0.05)));

  // === TEMPERATURES ===
  const ect = sd('ect');
  if (ect.val < 195) ect.val += 0.08; else ect.val = jit(195, 1);
  if (curRPM > 6000 && tTPS > 70) ect.val = Math.min(225, ect.val + 0.12);

  const iat = sd('iat');
  if (tTPS > 60) iat.val = Math.min(160, iat.val + 0.12); else iat.val = Math.max(82, iat.val - 0.06);
  iat.val = jit(iat.val, 0.2);

  // === ELECTRICAL / OTHER ===
  sd('bat').val = jit(14.2, 0.08);
  sd('pa').val = jit(101.3, 0.2);

  // Fuel economy approximation (mpg)
  if (sd('vss').val > 2 && sd('inj').val > 0.5) {
    // Rough: lower inj duration at speed = better mpg
    const instantMPG = (sd('vss').val / (sd('inj').val * curRPM / 1000)) * 8;
    sd('eco').val += (Math.min(60, Math.max(0, instantMPG)) - sd('eco').val) * 0.05;
  } else {
    sd('eco').val += (0 - sd('eco').val) * 0.1;
  }

  // === KNOCK ===
  if (curRPM > 5500 && tTPS > 70 && Math.random() < 0.006) {
    sd('kcount').val++;
  }
  // Knock level: random spikes when knock occurs
  sd('klevel').val = (sd('kcount').val > 0 && Math.random() < 0.05) ? jit(30, 20) : Math.max(0, sd('klevel').val * 0.9);
  sd('kretard').val = sd('kcount').val > 0 ? Math.min(sd('kcount').val * 1.2, 15) : Math.max(0, sd('kretard').val * 0.95);
  sd('kctrl').val = sd('kretard').val > 0 ? Math.min(100, sd('kretard').val * 8) : Math.max(0, sd('kctrl').val * 0.9);

  if (currentTab === 'sensors') updateSensorCards();
}

function flattenRefData(data) {
  const items = [];

  // Sensors
  if (data.sensors) {
    Object.entries(data.sensors).forEach(([key, s]) => {
      if (key === '_description') return;
      items.push({
        category: 'sensors',
        catLabel: 'SENSORS',
        id: key,
        name: s.name || key,
        fullName: s.full_name || '',
        description: s.description || '',
        unit: s.unit || '',
        range: s.range || null,
        subcat: s.category || '',
        tips: s.tips || [],
        type: 'sensor'
      });
    });
  }

  // Calibration Tables
  if (data.calibration_tables) {
    Object.entries(data.calibration_tables).forEach(([groupKey, group]) => {
      if (groupKey === '_description' || typeof group !== 'object') return;
      if (Array.isArray(group)) {
        group.forEach(t => {
          items.push({
            category: 'tables',
            catLabel: 'TABLES',
            id: t.name || groupKey,
            name: t.name || groupKey,
            fullName: t.full_name || '',
            description: t.description || '',
            unit: t.unit || '',
            subcat: groupKey,
            tips: t.tips || [],
            axes: t.axes || null,
            type: 'table'
          });
        });
      } else if (group.tables) {
        group.tables.forEach(t => {
          items.push({
            category: 'tables',
            catLabel: 'TABLES',
            id: t.name || groupKey,
            name: t.name || groupKey,
            fullName: t.full_name || '',
            description: t.description || '',
            unit: t.unit || '',
            subcat: groupKey,
            tips: t.tips || [],
            axes: t.axes || null,
            type: 'table'
          });
        });
      }
    });
  }

  // Parameters
  if (data.parameters) {
    Object.entries(data.parameters).forEach(([groupKey, group]) => {
      if (groupKey === '_description' || typeof group !== 'object') return;
      const paramList = group.parameters || group.items || group;
      if (Array.isArray(paramList)) {
        paramList.forEach(p => {
          items.push({
            category: 'parameters',
            catLabel: 'PARAMETERS',
            id: p.name || groupKey,
            name: p.name || groupKey,
            fullName: p.full_name || '',
            description: p.description || '',
            unit: p.unit || '',
            options: p.options || null,
            subcat: groupKey,
            tips: p.tips || p.warnings || [],
            type: 'parameter'
          });
        });
      } else if (typeof paramList === 'object' && !Array.isArray(paramList)) {
        // It's a nested object with description/items
        const desc = group.description || '';
        const subItems = group.parameters || group.items || [];
        if (Array.isArray(subItems) && subItems.length > 0) {
          subItems.forEach(p => {
            items.push({
              category: 'parameters',
              catLabel: 'PARAMETERS',
              id: p.name || groupKey,
              name: p.name || groupKey,
              fullName: p.full_name || '',
              description: p.description || desc,
              unit: p.unit || '',
              subcat: groupKey,
              tips: p.tips || p.warnings || [],
              type: 'parameter'
            });
          });
        } else {
          // Just add the group itself as a single entry
          items.push({
            category: 'parameters',
            catLabel: 'PARAMETERS',
            id: groupKey,
            name: groupKey.replace(/_/g, ' ').toUpperCase(),
            fullName: '',
            description: desc,
            unit: '',
            subcat: groupKey,
            tips: group.tips || [],
            children: group,
            type: 'param_group'
          });
        }
      }
    });
  }

  // Tuning Guides
  if (data.tuning_guides) {
    Object.entries(data.tuning_guides).forEach(([key, guide]) => {
      if (key === '_description') return;
      items.push({
        category: 'tuning',
        catLabel: 'TUNING GUIDES',
        id: key,
        name: guide.title || key.replace(/_/g, ' ').toUpperCase(),
        fullName: '',
        description: guide.description || '',
        steps: guide.steps || guide.procedure || [],
        tips: guide.tips || guide.warnings || [],
        type: 'guide'
      });
    });
  }

  // Vehicle Notes
  if (data.vehicle_notes) {
    Object.entries(data.vehicle_notes).forEach(([key, note]) => {
      if (key === '_description') return;
      items.push({
        category: 'vehicles',
        catLabel: 'VEHICLES',
        id: key,
        name: note.name || note.title || key.replace(/_/g, ' ').toUpperCase(),
        fullName: note.years || '',
        description: note.description || note.notes || '',
        tips: note.tips || [],
        features: note.features || note.ecus || null,
        type: 'vehicle'
      });
    });
  }

  // Bluetooth
  if (data.bluetooth) {
    Object.entries(data.bluetooth).forEach(([key, val]) => {
      if (key === '_description' || typeof val !== 'object') return;
      const desc = typeof val === 'string' ? val : (val.description || JSON.stringify(val));
      items.push({
        category: 'bluetooth',
        catLabel: 'BLUETOOTH',
        id: key,
        name: key.replace(/_/g, ' ').toUpperCase(),
        fullName: '',
        description: typeof val === 'object' ? (val.description || '') : String(val),
        tips: val.tips || [],
        children: typeof val === 'object' ? val : null,
        type: 'feature'
      });
    });
  }

  // Datalogging
  if (data.datalogging) {
    Object.entries(data.datalogging).forEach(([key, val]) => {
      if (key === '_description' || typeof val !== 'object') return;
      items.push({
        category: 'datalogging',
        catLabel: 'DATALOGGING',
        id: key,
        name: key.replace(/_/g, ' ').toUpperCase(),
        fullName: '',
        description: typeof val === 'object' ? (val.description || '') : String(val),
        tips: val.tips || [],
        children: typeof val === 'object' ? val : null,
        type: 'feature'
      });
    });
  }

  // Error Codes
  if (data.error_codes) {
    Object.entries(data.error_codes).forEach(([key, val]) => {
      if (key === '_description' || typeof val !== 'object') return;
      items.push({
        category: 'error_codes',
        catLabel: 'ERROR CODES',
        id: key,
        name: key.replace(/_/g, ' ').toUpperCase(),
        fullName: '',
        description: typeof val === 'object' ? (val.description || '') : String(val),
        tips: val.tips || [],
        children: typeof val === 'object' ? val : null,
        type: 'feature'
      });
    });
  }

  // Traction Control
  if (data.traction_control) {
    Object.entries(data.traction_control).forEach(([key, val]) => {
      if (key === '_description' || typeof val !== 'object') return;
      items.push({
        category: 'traction',
        catLabel: 'TRACTION CTRL',
        id: key,
        name: key.replace(/_/g, ' ').toUpperCase(),
        fullName: '',
        description: typeof val === 'object' ? (val.description || '') : String(val),
        tips: val.tips || [],
        children: typeof val === 'object' ? val : null,
        type: 'feature'
      });
    });
  }

  // Features
  if (data.features) {
    Object.entries(data.features).forEach(([key, val]) => {
      if (key === '_description' || typeof val !== 'object') return;
      items.push({
        category: 'features',
        catLabel: 'FEATURES',
        id: key,
        name: key.replace(/_/g, ' ').toUpperCase(),
        fullName: '',
        description: typeof val === 'object' ? (val.description || '') : String(val),
        tips: val.tips || [],
        children: typeof val === 'object' ? val : null,
        type: 'feature'
      });
    });
  }

  return items;
}

function buildRefCategories() {
  const bar = document.getElementById('ref-cat-bar');
  const cats = {};
  refItems.forEach(item => {
    if (!cats[item.category]) cats[item.category] = { label: item.catLabel, count: 0 };
    cats[item.category].count++;
  });

  let html = '<button class="ref-cat-btn active" onclick="setRefCategory(\'all\',this)">ALL<span class="ref-cat-count">' + refItems.length + '</span></button>';
  Object.entries(cats).forEach(([key, c]) => {
    html += '<button class="ref-cat-btn" onclick="setRefCategory(\'' + key + '\',this)">' + c.label + '<span class="ref-cat-count">' + c.count + '</span></button>';
  });
  bar.innerHTML = html;
}

function setRefCategory(cat, btn) {
  refCategory = cat;
  document.querySelectorAll('.ref-cat-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderRefItems();
}

function filterReference() {
  renderRefItems();
}

function renderRefItems() {
  const query = (document.getElementById('ref-search').value || '').toLowerCase().trim();
  const list = document.getElementById('ref-list');
  const countEl = document.getElementById('ref-results-count');

  let filtered = refItems;

  // Category filter
  if (refCategory !== 'all') {
    filtered = filtered.filter(item => item.category === refCategory);
  }

  // Search filter
  if (query) {
    filtered = filtered.filter(item => {
      const searchText = [item.name, item.fullName, item.description, item.subcat || '', ...(item.tips || [])].join(' ').toLowerCase();
      return query.split(/\s+/).every(word => searchText.includes(word));
    });
  }

  countEl.textContent = filtered.length + ' RESULT' + (filtered.length !== 1 ? 'S' : '');

  if (filtered.length === 0) {
    list.innerHTML = '<div class="ref-empty">NO RESULTS FOUND</div>';
    return;
  }

  // Limit to 50 for performance
  const display = filtered.slice(0, 50);
  let html = '';

  display.forEach((item, idx) => {
    html += '<div class="ref-card" id="ref-card-' + idx + '" onclick="toggleRefCard(' + idx + ')">';
    html += '<div class="ref-card-head">';
    html += '<span class="ref-card-name">' + esc(item.name) + '</span>';
    if (item.fullName) html += '<span class="ref-card-full">' + esc(item.fullName) + '</span>';
    html += '<div class="ref-card-pills">';
    html += '<span class="pill pill-dim">' + esc(item.catLabel) + '</span>';
    if (item.unit) html += '<span class="pill pill-blue">' + esc(item.unit) + '</span>';
    if (item.subcat) html += '<span class="pill pill-dim">' + esc(item.subcat) + '</span>';
    html += '</div></div>';

    // Expandable body
    html += '<div class="ref-card-body">';
    if (item.description) {
      html += '<div class="ref-card-desc">' + esc(item.description) + '</div>';
    }

    if (item.range) {
      html += '<div class="ref-card-detail"><span class="ref-card-detail-label">RANGE</span><span class="ref-card-detail-val">' + item.range[0] + ' — ' + item.range[1] + (item.unit ? ' ' + esc(item.unit) : '') + '</span></div>';
    }

    if (item.axes) {
      html += '<div class="ref-card-detail"><span class="ref-card-detail-label">X AXIS</span><span class="ref-card-detail-val">' + esc(item.axes.x || '') + '</span></div>';
      html += '<div class="ref-card-detail"><span class="ref-card-detail-label">Y AXIS</span><span class="ref-card-detail-val">' + esc(item.axes.y || '') + '</span></div>';
    }

    if (item.options && Array.isArray(item.options)) {
      html += '<div class="ref-card-detail"><span class="ref-card-detail-label">OPTIONS</span><span class="ref-card-detail-val">' + item.options.map(o => esc(String(o))).join(', ') + '</span></div>';
    }

    // Steps (for tuning guides)
    if (item.steps && Array.isArray(item.steps) && item.steps.length > 0) {
      html += '<div class="ref-card-items">';
      item.steps.forEach((step, si) => {
        html += '<div class="ref-card-item"><span style="color:#cc2200;">' + (si + 1) + '.</span> ' + esc(String(step)) + '</div>';
      });
      html += '</div>';
    }

    // Features (for vehicle notes)
    if (item.features && typeof item.features === 'object') {
      html += '<div class="ref-card-items">';
      if (Array.isArray(item.features)) {
        item.features.forEach(f => {
          html += '<div class="ref-card-item">' + esc(String(f)) + '</div>';
        });
      } else {
        Object.entries(item.features).forEach(([k, v]) => {
          html += '<div class="ref-card-item"><span class="ref-card-item-name">' + esc(k) + ':</span> ' + esc(String(v)) + '</div>';
        });
      }
      html += '</div>';
    }

    // Children (nested object data)
    if (item.children && typeof item.children === 'object' && !Array.isArray(item.children)) {
      html += '<div class="ref-card-items">';
      Object.entries(item.children).forEach(([k, v]) => {
        if (k === 'description' || k === 'tips' || k === 'warnings') return;
        const val = typeof v === 'object' ? JSON.stringify(v) : String(v);
        if (val.length < 200) {
          html += '<div class="ref-card-item"><span class="ref-card-item-name">' + esc(k.replace(/_/g, ' ')) + ':</span> ' + esc(val) + '</div>';
        }
      });
      html += '</div>';
    }

    // Tips
    if (item.tips && item.tips.length > 0) {
      item.tips.forEach(tip => {
        html += '<div class="ref-card-tip">' + esc(String(tip)) + '</div>';
      });
    }

    html += '</div></div>';
  });

  if (filtered.length > 50) {
    html += '<div class="ref-empty" style="padding:20px;">SHOWING 50 OF ' + filtered.length + ' RESULTS — REFINE YOUR SEARCH</div>';
  }

  list.innerHTML = html;
}

function toggleRefCard(idx) {
  const card = document.getElementById('ref-card-' + idx);
  if (card) card.classList.toggle('expanded');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Load reference data on startup
loadReference();
</script>
</body>
</html>
