<!DOCTYPE html>
<html><head>

<style>body{margin:0}#map{width:100vw;height:100vh}</style>
</head><body>
<div id="map"></div>
<script>
mapboxgl.accessToken='pk.eyJ1IjoibWFya2hleW1hbm4iLCJhIjoiY21tejRoaXg5MDR4czJvcHp4YWF0bTg2byJ9.rla6beZVPZpv-ms6742DsQ';
const map=new mapboxgl.Map({container:'map',style:'mapbox://styles/mapbox/dark-v11',center:[-71.2,42.34],zoom:11});

  });
  map.addLayer({id:'border',type:'line',source:'route',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':'#111','line-width':9,'line-opacity':0.5}});
  map.addLayer({id:'line',type:'line',source:'route',layout:{'line-join':'round','line-cap':'round'},paint:{
    'line-gradient':['interpolate',['linear'],['line-progress'],0,'blue',0.25,'cyan',0.5,'yellow',0.75,'orange',1,'red'],
    'line-width':6,'line-opacity':1
  }});
});
</script></body></html>
