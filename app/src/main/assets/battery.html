<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100vw; height:100vh; overflow:hidden; font-family:'Share Tech Mono',monospace; background:#0a0000; color:#fff; }

/* Status bar */
.status-bar {
  height:32px; background:#0d0000; border-bottom:1px solid #cc110033;
  display:flex; align-items:center; padding:0 16px; gap:16px;
}
.status-dot { width:8px; height:8px; border-radius:50%; background:#cc220044; }
.status-dot.connected { background:#00ff41; box-shadow:0 0 6px #00ff41; }
.status-title { font-size:11px; color:#cc220088; letter-spacing:3px; font-family:'Orbitron',monospace; }
.status-text { font-size:10px; color:#ffffff44; letter-spacing:2px; margin-left:auto; }

/* Main layout */
.main {
  display:flex; height:calc(100vh - 32px); padding:20px 30px; gap:30px;
  align-items:center; justify-content:center;
}

/* Left: SOC ring */
.soc-section {
  display:flex; flex-direction:column; align-items:center; gap:16px; min-width:280px;
}
.ring-container { position:relative; width:240px; height:240px; }
.ring-canvas { width:240px; height:240px; }
.ring-center {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  text-align:center;
}
.soc-pct { font-family:'Orbitron',monospace; font-size:52px; color:#ffffffee; letter-spacing:3px; }
.soc-label { font-size:10px; color:#ffffff33; letter-spacing:3px; margin-top:2px; }

.test-btn {
  background:transparent; border:2px solid #cc220066; color:#cc220088;
  font-family:'Orbitron',monospace; font-size:13px; letter-spacing:4px;
  padding:12px 36px; cursor:pointer; border-radius:4px; transition:all 0.2s;
}
.test-btn:hover { border-color:#cc2200; color:#cc2200; background:rgba(204,34,0,0.08); }
.test-btn.testing { border-color:#ffaa00; color:#ffaa00; pointer-events:none; }
.test-btn.done { border-color:#00ff41; color:#00ff41; }

/* Right: readouts */
.readouts {
  display:flex; flex-direction:column; gap:12px; min-width:340px;
}
.readout-card {
  background:#0d0000; border:1px solid #cc110022; border-radius:4px;
  padding:14px 18px; display:flex; align-items:center; gap:16px;
}
.readout-icon { font-size:20px; opacity:0.3; width:28px; text-align:center; }
.readout-info { flex:1; }
.readout-label { font-size:9px; color:#ffffff33; letter-spacing:2px; margin-bottom:3px; }
.readout-value { font-family:'Orbitron',monospace; font-size:24px; color:#ffffffdd; letter-spacing:1px; }
.readout-unit { font-size:10px; color:#ffffff33; margin-left:4px; }
.readout-bar { width:100px; height:4px; background:#cc110011; border-radius:2px; margin-left:auto; }
.readout-bar-fill { height:4px; border-radius:2px; transition:width 0.3s; }

/* Verdict */
.verdict-bar {
  position:absolute; bottom:0; left:0; right:0; height:56px;
  background:#0d0000; border-top:1px solid #cc110022;
  display:flex; align-items:center; padding:0 30px; gap:20px;
}
.verdict-label { font-size:9px; color:#ffffff33; letter-spacing:2px; }
.verdict-result {
  font-family:'Orbitron',monospace; font-size:18px; letter-spacing:4px;
  padding:4px 20px; border:1px solid; border-radius:3px;
}
.verdict-pass { color:#00ff41; border-color:#00ff4144; text-shadow:0 0 8px #00ff4133; }
.verdict-marginal { color:#ffaa00; border-color:#ffaa0044; text-shadow:0 0 8px #ffaa0033; }
.verdict-fail { color:#cc2200; border-color:#cc220044; text-shadow:0 0 8px #cc220033; }
.verdict-none { color:#ffffff22; border-color:#ffffff11; }

.verdict-detail { font-size:10px; color:#ffffff44; letter-spacing:1px; flex:1; }

.report-btn {
  background:transparent; border:1px solid #cc220033; color:#cc220066;
  font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px;
  padding:6px 16px; cursor:pointer; border-radius:3px; transition:all 0.15s;
}
.report-btn:hover { border-color:#cc2200; color:#cc2200; }
.report-btn.hidden { display:none; }

/* Charging system indicator */
.charging-row {
  display:flex; align-items:center; gap:10px; margin-top:4px;
}
.charging-dot { width:6px; height:6px; border-radius:50%; }
.charging-text { font-size:9px; letter-spacing:1px; }
</style>
</head>
<body>

<div class="status-bar">
  <div class="status-dot" id="conn-dot"></div>
  <div class="status-title">BATTERY HEALTH TEST</div>
  <div class="status-text" id="conn-text">OBD NOT CONNECTED - SIMULATED DATA</div>
</div>

<div class="main">
  <!-- Left: SOC Ring -->
  <div class="soc-section">
    <div class="ring-container">
      <canvas class="ring-canvas" id="ring" width="480" height="480"></canvas>
      <div class="ring-center">
        <div class="soc-pct" id="soc-pct">--</div>
        <div class="soc-label">STATE OF CHARGE</div>
      </div>
    </div>
    <button class="test-btn" id="test-btn" onclick="startTest()">START TEST</button>
  </div>

  <!-- Right: Readouts -->
  <div class="readouts">
    <div class="readout-card">
      <div class="readout-icon">⚡</div>
      <div class="readout-info">
        <div class="readout-label">VOLTAGE</div>
        <div><span class="readout-value" id="val-voltage">--</span><span class="readout-unit">V</span></div>
      </div>
      <div class="readout-bar"><div class="readout-bar-fill" id="bar-voltage" style="width:0%;background:#44aaff"></div></div>
    </div>

    <div class="readout-card">
      <div class="readout-icon">↯</div>
      <div class="readout-info">
        <div class="readout-label">COLD CRANKING AMPS</div>
        <div><span class="readout-value" id="val-cca">--</span><span class="readout-unit">CCA</span></div>
      </div>
      <div class="readout-bar"><div class="readout-bar-fill" id="bar-cca" style="width:0%;background:#00cc88"></div></div>
    </div>

    <div class="readout-card">
      <div class="readout-icon">Ω</div>
      <div class="readout-info">
        <div class="readout-label">INTERNAL RESISTANCE</div>
        <div><span class="readout-value" id="val-resist">--</span><span class="readout-unit">mΩ</span></div>
      </div>
      <div class="readout-bar"><div class="readout-bar-fill" id="bar-resist" style="width:0%;background:#ffaa00"></div></div>
    </div>

    <div class="readout-card">
      <div class="readout-icon">⎓</div>
      <div class="readout-info">
        <div class="readout-label">CHARGING SYSTEM</div>
        <div><span class="readout-value" id="val-charging" style="font-size:16px">--</span></div>
        <div class="charging-row">
          <div class="charging-dot" id="charging-dot" style="background:#ffffff22"></div>
          <div class="charging-text" id="charging-status" style="color:#ffffff33">WAITING FOR TEST</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Verdict bar -->
<div class="verdict-bar">
  <div class="verdict-label">RESULT</div>
  <div class="verdict-result verdict-none" id="verdict">WAITING</div>
  <div class="verdict-detail" id="verdict-detail">Run test to diagnose battery health</div>
  <button class="report-btn hidden" id="report-btn" onclick="showReport()">EXPORT REPORT</button>
</div>

<script>
// ============ STATE ============
let testState = 'idle'; // idle | testing | done
let testProgress = 0;
let testResults = null;

// Battery specs for K20Z3 / 8th gen Civic Si
const SPEC = {
  ratedCCA: 640,   // OEM battery spec
  nominalV: 12.6,
  chargingV: 14.2,
  minCCA: 400,     // below this = fail
  marginalCCA: 520, // below this = marginal
};

// Simulated values
let simVoltage = 12.58;
let simEngineRunning = false;

// ============ RING GAUGE ============
const ringCanvas = document.getElementById('ring');
const rctx = ringCanvas.getContext('2d');

function drawRing(soc, color) {
  const W = ringCanvas.width, H = ringCanvas.height;
  const cx = W / 2, cy = H / 2;
  const r = 190;
  const lineW = 14;

  rctx.clearRect(0, 0, W, H);

  // Background ring
  rctx.beginPath();
  rctx.arc(cx, cy, r, 0, Math.PI * 2);
  rctx.strokeStyle = '#cc110015';
  rctx.lineWidth = lineW;
  rctx.stroke();

  // Tick marks
  for (let i = 0; i < 40; i++) {
    const angle = (i / 40) * Math.PI * 2 - Math.PI / 2;
    const inner = r - lineW / 2 - 4;
    const outer = r - lineW / 2 - 10;
    rctx.beginPath();
    rctx.moveTo(cx + Math.cos(angle) * inner, cy + Math.sin(angle) * inner);
    rctx.lineTo(cx + Math.cos(angle) * outer, cy + Math.sin(angle) * outer);
    rctx.strokeStyle = i < (soc / 100) * 40 ? color + '44' : '#ffffff08';
    rctx.lineWidth = 1;
    rctx.stroke();
  }

  if (soc <= 0) return;

  // SOC arc
  const startAngle = -Math.PI / 2;
  const endAngle = startAngle + (soc / 100) * Math.PI * 2;

  rctx.beginPath();
  rctx.arc(cx, cy, r, startAngle, endAngle);
  rctx.strokeStyle = color;
  rctx.lineWidth = lineW;
  rctx.lineCap = 'round';
  rctx.shadowColor = color;
  rctx.shadowBlur = 12;
  rctx.stroke();
  rctx.shadowBlur = 0;
  rctx.lineCap = 'butt';

  // Glow dot at end
  const dotX = cx + Math.cos(endAngle) * r;
  const dotY = cy + Math.sin(endAngle) * r;
  rctx.beginPath();
  rctx.arc(dotX, dotY, 4, 0, Math.PI * 2);
  rctx.fillStyle = '#fff';
  rctx.shadowColor = color;
  rctx.shadowBlur = 10;
  rctx.fill();
  rctx.shadowBlur = 0;
}

// ============ TEST SEQUENCE ============
function startTest() {
  if (testState === 'testing') return;
  testState = 'testing';
  testProgress = 0;
  testResults = null;

  const btn = document.getElementById('test-btn');
  btn.className = 'test-btn testing';
  btn.textContent = 'TESTING...';

  document.getElementById('verdict').className = 'verdict-result verdict-none';
  document.getElementById('verdict').textContent = 'TESTING';
  document.getElementById('verdict-detail').textContent = 'Sampling battery parameters...';
  document.getElementById('report-btn').classList.add('hidden');

  // Animate test over 3 seconds (30 steps at 100ms)
  const steps = 30;
  let step = 0;
  const testInterval = setInterval(() => {
    step++;
    testProgress = (step / steps) * 100;

    // Simulate voltage fluctuation during test
    simVoltage = 12.58 + (Math.random() - 0.5) * 0.15 - (step < 15 ? step * 0.02 : (30 - step) * 0.02);
    updateReadouts(simVoltage, null, null, null);

    if (step >= steps) {
      clearInterval(testInterval);
      finishTest();
    }
  }, 100);
}

function finishTest() {
  // Generate results
  const voltage = 12.55 + Math.random() * 0.15;
  const cca = Math.round(SPEC.ratedCCA * (0.88 + Math.random() * 0.12)); // 88-100% of rated
  const resistance = parseFloat((4.5 + Math.random() * 2).toFixed(1));
  const soc = Math.round(Math.max(0, Math.min(100, ((voltage - 10.5) / (12.7 - 10.5)) * 100)));

  simEngineRunning = true;
  const chargingV = 14.1 + Math.random() * 0.3;
  const chargingOK = chargingV >= 13.5 && chargingV <= 15.0;

  testResults = { voltage, cca, resistance, soc, chargingV, chargingOK };

  // Determine verdict
  let verdict, verdictClass, detail;
  if (cca >= SPEC.marginalCCA && voltage >= 12.2) {
    verdict = 'PASS';
    verdictClass = 'verdict-pass';
    detail = `Battery healthy — ${cca} CCA of ${SPEC.ratedCCA} rated (${Math.round(cca/SPEC.ratedCCA*100)}%)`;
  } else if (cca >= SPEC.minCCA) {
    verdict = 'MARGINAL';
    verdictClass = 'verdict-marginal';
    detail = `Battery degraded — ${cca} CCA of ${SPEC.ratedCCA} rated (${Math.round(cca/SPEC.ratedCCA*100)}%) — Replace soon`;
  } else {
    verdict = 'FAIL';
    verdictClass = 'verdict-fail';
    detail = `Battery failed — ${cca} CCA of ${SPEC.ratedCCA} rated (${Math.round(cca/SPEC.ratedCCA*100)}%) — Replace immediately`;
  }

  // Update UI
  testState = 'done';
  const btn = document.getElementById('test-btn');
  btn.className = 'test-btn done';
  btn.textContent = 'TEST AGAIN';
  btn.onclick = () => { testState = 'idle'; startTest(); };

  document.getElementById('soc-pct').textContent = soc + '%';
  const socColor = soc > 70 ? '#00ff41' : soc > 40 ? '#ffaa00' : '#cc2200';
  document.getElementById('soc-pct').style.color = socColor;
  drawRing(soc, socColor);

  updateReadouts(voltage, cca, resistance, { v: chargingV, ok: chargingOK });

  document.getElementById('verdict').className = 'verdict-result ' + verdictClass;
  document.getElementById('verdict').textContent = verdict;
  document.getElementById('verdict-detail').textContent = detail;
  document.getElementById('report-btn').classList.remove('hidden');
}

function updateReadouts(voltage, cca, resistance, charging) {
  if (voltage !== null) {
    document.getElementById('val-voltage').textContent = voltage.toFixed(2);
    const vPct = Math.max(0, Math.min(100, ((voltage - 10) / 5) * 100));
    document.getElementById('bar-voltage').style.width = vPct + '%';
    const vColor = voltage >= 12.2 ? '#44aaff' : voltage >= 11.8 ? '#ffaa00' : '#cc2200';
    document.getElementById('bar-voltage').style.background = vColor;
  }

  if (cca !== null) {
    document.getElementById('val-cca').textContent = cca;
    const ccaPct = Math.max(0, Math.min(100, (cca / SPEC.ratedCCA) * 100));
    document.getElementById('bar-cca').style.width = ccaPct + '%';
    const ccaColor = cca >= SPEC.marginalCCA ? '#00cc88' : cca >= SPEC.minCCA ? '#ffaa00' : '#cc2200';
    document.getElementById('bar-cca').style.background = ccaColor;
  }

  if (resistance !== null) {
    document.getElementById('val-resist').textContent = resistance;
    const rPct = Math.max(0, Math.min(100, (1 - resistance / 15) * 100));
    document.getElementById('bar-resist').style.width = rPct + '%';
    const rColor = resistance < 6 ? '#ffaa00' : resistance < 8 ? '#ffaa00' : '#cc2200';
    document.getElementById('bar-resist').style.background = resistance < 6 ? '#00cc88' : rColor;
  }

  if (charging !== null) {
    document.getElementById('val-charging').textContent = charging.v.toFixed(1) + ' V';
    document.getElementById('val-charging').style.color = charging.ok ? '#00ff41' : '#cc2200';
    document.getElementById('charging-dot').style.background = charging.ok ? '#00ff41' : '#cc2200';
    document.getElementById('charging-dot').style.boxShadow = '0 0 4px ' + (charging.ok ? '#00ff41' : '#cc2200');
    document.getElementById('charging-status').textContent = charging.ok ? 'ALTERNATOR OK' : 'CHECK ALTERNATOR';
    document.getElementById('charging-status').style.color = charging.ok ? '#00ff4188' : '#cc220088';
  }
}

// ============ REPORT ============
function showReport() {
  if (!testResults) return;
  const r = testResults;
  const lines = [
    '═══════════════════════════════════════',
    '          BATTERY HEALTH REPORT        ',
    '═══════════════════════════════════════',
    '',
    '  Date:          ' + new Date().toLocaleString(),
    '  Vehicle:       2007 Honda Civic Si',
    '  Engine:        K20Z3',
    '',
    '  ─── BATTERY ─────────────────────────',
    '  Voltage:       ' + r.voltage.toFixed(2) + ' V',
    '  CCA Measured:  ' + r.cca + ' A',
    '  CCA Rated:     ' + SPEC.ratedCCA + ' A',
    '  CCA Health:    ' + Math.round(r.cca / SPEC.ratedCCA * 100) + '%',
    '  Resistance:    ' + r.resistance + ' mΩ',
    '  State of Chg:  ' + r.soc + '%',
    '',
    '  ─── CHARGING SYSTEM ─────────────────',
    '  Alt. Output:   ' + r.chargingV.toFixed(1) + ' V',
    '  Status:        ' + (r.chargingOK ? 'OK' : 'CHECK ALTERNATOR'),
    '',
    '  ─── VERDICT ─────────────────────────',
    '  Result:        ' + document.getElementById('verdict').textContent,
    '',
    '═══════════════════════════════════════',
    '  Generated by HondaDash Battery Test  ',
    '═══════════════════════════════════════',
  ];

  const csv = lines.join('\n');
  const blob = new Blob([csv], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'battery_report_' + new Date().toISOString().slice(0, 19).replace(/:/g, '-') + '.txt';
  a.click();
  URL.revokeObjectURL(url);

  document.getElementById('report-btn').textContent = 'SAVED';
  setTimeout(() => { document.getElementById('report-btn').textContent = 'EXPORT REPORT'; }, 2000);
}

// ============ BRIDGE (for Kotlin) ============
function updateBatteryFromOBD(voltage) {
  simVoltage = voltage;
  document.getElementById('conn-dot').classList.add('connected');
  document.getElementById('conn-text').textContent = 'OBD CONNECTED';
}

// ============ INIT ============
// Draw empty ring
drawRing(0, '#ffffff22');
document.getElementById('soc-pct').textContent = '--';
</script>
</body>
</html>
