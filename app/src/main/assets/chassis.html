<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0000; width:100vw; height:100vh; overflow:hidden; font-family:'Share Tech Mono',monospace; }
.scanlines { position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px); pointer-events:none; z-index:10; }
.hbar { position:fixed; top:0; left:0; right:0; height:56px; border-bottom:1px solid #cc000033; background:rgba(10,0,0,0.85); z-index:20; display:flex; align-items:center; justify-content:space-between; padding:0 20px; }
.hbar-title { font-family:'Orbitron',monospace; font-size:22px; color:#ff4422cc; letter-spacing:3px; }
.hbar-sub { font-size:16px; color:#ffffff66; letter-spacing:2px; }

/* INFO PANEL */
.info-panel { position:fixed; right:0; top:56px; bottom:60px; width:320px; background:rgba(5,0,0,0.96); border-left:1px solid #cc110033; z-index:30; transform:translateX(100%); transition:transform 0.3s; padding:20px; overflow-y:auto; }
.info-panel.open { transform:translateX(0); }
.info-close { background:transparent; border:1px solid #ffffff44; color:#ffffff88; font-family:'Share Tech Mono',monospace; font-size:16px; padding:8px 16px; cursor:pointer; margin-bottom:16px; display:block; width:100%; }
.info-close:hover { border-color:#ff4422; color:#ff4422; }
.info-part { font-family:'Orbitron',monospace; font-size:18px; color:#ff4422; margin-bottom:8px; line-height:1.3; }
.info-spec { font-size:15px; color:#ffffffcc; margin-bottom:6px; line-height:1.7; }
.info-detail { font-size:13px; color:#ffffff66; line-height:1.8; margin-top:8px; }
.info-divider { height:1px; background:#ffffff11; margin:12px 0; }
.info-label { font-size:12px; color:#ffffff44; letter-spacing:2px; margin-bottom:4px; }
.info-stock { font-size:13px; color:#ffffff33; text-decoration:line-through; }
.info-upgrade { font-size:14px; color:#ffaa00cc; }

/* BOTTOM BAR */
.bottom-bar { position:fixed; bottom:0; left:0; right:0; height:60px; background:rgba(5,0,0,0.9); border-top:1px solid #cc110022; z-index:20; display:flex; align-items:center; justify-content:center; gap:16px; }
.bot-btn { background:transparent; border:1px solid #ffffff33; color:#ffffff88; font-family:'Share Tech Mono',monospace; font-size:15px; letter-spacing:2px; padding:8px 18px; cursor:pointer; transition:all 0.15s; }
.bot-btn:hover { border-color:#ff4422; color:#ff4422; }
.bot-btn.active { border-color:#ff4422aa; color:#ff4422cc; }

.ambient { position:fixed; inset:0; background:radial-gradient(ellipse 100% 80% at 50% 50%, rgba(80,0,0,0.06) 0%, transparent 70%); pointer-events:none; z-index:5; }

/* SVG tap targets */
.tap-zone { cursor:pointer; }
.tap-zone:hover { opacity:0.7; }
</style>
</head>

  <text x="450" y="490" text-anchor="middle" font-family="Share Tech Mono" font-size="8" fill="#cc110044">▼ REAR</text>

</svg>

<!-- INFO PANEL -->
<div class="info-panel" id="info-panel">

</div>

function showInfo(key) {
  const c = components[key];
  if (!c) return;

  document.getElementById('info-part').textContent = c.name;

  const statusColor = c.status === 'UPGRADED' ? '#ffaa00' : c.status === 'REPLACED' ? '#00ff41' : '#ffffff44';
  const statusBg = c.status === 'UPGRADED' ? 'rgba(255,170,0,0.08)' : c.status === 'REPLACED' ? 'rgba(0,255,65,0.05)' : 'rgba(255,255,255,0.03)';

  let html = `<div style="display:inline-block;font-size:13px;padding:4px 12px;border:1px solid ${statusColor}55;color:${statusColor};background:${statusBg};letter-spacing:2px;margin-bottom:14px;">${c.status}</div>`;

  if (c.upgrade) {
    html += `<div class="info-label">INSTALLED</div>`;
    html += `<div class="info-upgrade" style="margin-bottom:12px;">▶ ${c.upgrade}</div>`;
  }

  html += `<div class="info-label">SPECIFICATIONS</div>`;
  c.specs.forEach(([label, val]) => {
    html += `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #ffffff08;">
      <span style="font-size:13px;color:#ffffff44;">${label}</span>
      <span style="font-size:13px;color:#ffffffcc;">${val}</span>
    </div>`;
  });

  html += `<div class="info-divider"></div>`;
  html += `<div class="info-label">NOTES</div>`;
  html += `<div class="info-detail">${c.detail}</div>`;

  document.getElementById('info-body').innerHTML = html;
  document.getElementById('info-panel').classList.add('open');
}

function closePanel() {
  document.getElementById('info-panel').classList.remove('open');
}

let labelsVisible = true;
function toggleLabels() {
  labelsVisible = !labelsVisible;
  const btn = document.getElementById('btn-labels');
  btn.textContent = labelsVisible ? '[ LABELS ON ]' : '[ LABELS OFF ]';
  btn.classList.toggle('active', labelsVisible);
  document.querySelectorAll('text').forEach(t => {
    t.style.display = labelsVisible ? '' : 'none';
  });
}

function resetView() {
  closePanel();
}
</script>
