<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Share Tech Mono',monospace;}
canvas{display:block;}
.scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:10;}
.hbar{position:fixed;top:0;left:0;right:0;height:48px;background:rgba(0,0,0,0.9);border-bottom:1px solid #ff330033;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:0 16px;}
.hbar-title{font-family:'Orbitron',monospace;font-size:13px;color:#ff4422;letter-spacing:3px;}
.hbar-sub{font-size:11px;color:#ffffff55;letter-spacing:2px;}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;height:52px;background:rgba(0,0,0,0.9);border-top:1px solid #ff330022;z-index:20;display:flex;align-items:center;justify-content:center;gap:12px;}
.btn{background:transparent;border:1px solid #ff330044;color:#ffffff66;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;padding:6px 14px;cursor:pointer;transition:all 0.15s;}
.btn:hover{border-color:#ff4422;color:#ff4422;}
.hint{position:fixed;bottom:65px;left:50%;transform:translateX(-50%);font-size:11px;color:#ffffff33;letter-spacing:2px;z-index:20;pointer-events:none;transition:opacity 0.8s;white-space:nowrap;text-align:center;}
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="hbar">
  <div class="hbar-title">K20Z3 // CYLINDER BLOCK</div>
  <div class="hbar-sub">DRAG TO ROTATE · SCROLL TO ZOOM</div>
</div>
<div id="canvas-container" style="position:fixed;top:48px;left:0;right:0;bottom:52px;"></div>
<div class="hint" id="hint">DRAG TO SPIN · SCROLL TO ZOOM</div>
<div class="bottom-bar">
  <button class="btn" onclick="resetView()">[ RESET VIEW ]</button>
  <button class="btn" onclick="toggleSpin()">[ AUTO SPIN ]</button>
  <button class="btn" onclick="toggleWire()">[ WIREFRAME ]</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const container = document.getElementById('canvas-container');
const W = container.clientWidth, H = container.clientHeight;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 100);
camera.position.set(0, 0, 5);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 1.0));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
dirLight.position.set(5, 5, 5);
scene.add(dirLight);

// Grid floor hint
const grid = new THREE.GridHelper(20, 40, 0x220000, 0x110000);
grid.position.y = -2.5;
scene.add(grid);

// Load the diagram as a texture on a plane
const loader = new THREE.TextureLoader();
loader.load(
  'file:///android_asset/engine_block.png',
  function(texture){
    texture.anisotropy = renderer.capabilities.getMaxAnisotropy();

    // Calculate aspect ratio from texture
    const aspect = texture.image.width / texture.image.height;
    const planeW = 4;
    const planeH = planeW / aspect;

    // Main diagram plane
    const geo = new THREE.PlaneGeometry(planeW, planeH);
    const mat = new THREE.MeshStandardMaterial({
      map: texture,
      side: THREE.DoubleSide,
      transparent: true,
    });

    // Make white background transparent using canvas
    const canvas = document.createElement('canvas');
    canvas.width = texture.image.width;
    canvas.height = texture.image.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(texture.image, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;

    // Remove white/near-white pixels
    for(let i = 0; i < data.length; i += 4){
      const r = data[i], g = data[i+1], b = data[i+2];
      if(r > 220 && g > 220 && b > 220){
        data[i+3] = 0; // transparent
      }
    }
    ctx.putImageData(imageData, 0, 0);

    const cleanTex = new THREE.CanvasTexture(canvas);
    mat.map = cleanTex;
    mat.needsUpdate = true;

    const plane = new THREE.Mesh(geo, mat);
    scene.add(plane);
    pivotGroup.add(plane);

    // Add a subtle red-tinted backing plane for depth
    const backGeo = new THREE.PlaneGeometry(planeW + 0.1, planeH + 0.1);
    const backMat = new THREE.MeshStandardMaterial({
      color: 0x0a0000,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.85,
    });
    const back = new THREE.Mesh(backGeo, backMat);
    back.position.z = -0.02;
    pivotGroup.add(back);

    // Red edge glow — thin border planes
    const edgeMat = new THREE.MeshBasicMaterial({color:0xff2200, transparent:true, opacity:0.4, side:THREE.DoubleSide});
    const eTop = new THREE.Mesh(new THREE.PlaneGeometry(planeW, 0.015), edgeMat);
    eTop.position.set(0, planeH/2, 0);
    pivotGroup.add(eTop);
    const eBot = new THREE.Mesh(new THREE.PlaneGeometry(planeW, 0.015), edgeMat);
    eBot.position.set(0, -planeH/2, 0);
    pivotGroup.add(eBot);
    const eLeft = new THREE.Mesh(new THREE.PlaneGeometry(0.015, planeH), edgeMat);
    eLeft.position.set(-planeW/2, 0, 0);
    pivotGroup.add(eLeft);
    const eRight = new THREE.Mesh(new THREE.PlaneGeometry(0.015, planeH), edgeMat);
    eRight.position.set(planeW/2, 0, 0);
    pivotGroup.add(eRight);

    document.getElementById('hbar-sub').textContent = 'DRAG TO ROTATE · SCROLL TO ZOOM';
  },
  undefined,
  function(err){
    console.error('Texture load error:', err);
    document.getElementById('hbar-sub').textContent = 'ERROR LOADING DIAGRAM';
  }
);

// Pivot group for rotation
const pivotGroup = new THREE.Group();
scene.add(pivotGroup);

// ====== CONTROLS ======
let isDragging = false, prevX = 0, prevY = 0;
let rotX = 0.2, rotY = 0.3, tRX = 0.2, tRY = 0.3;
let camZ = 5, tCamZ = 5;
let autoSpin = false;
let wireMode = false;

renderer.domElement.addEventListener('mousedown', e=>{ isDragging=true; prevX=e.clientX; prevY=e.clientY; });
renderer.domElement.addEventListener('mousemove', e=>{
  if(!isDragging) return;
  tRY += (e.clientX - prevX) * 0.01;
  tRX += (e.clientY - prevY) * 0.008;
  tRX = Math.max(-Math.PI/2, Math.min(Math.PI/2, tRX));
  prevX = e.clientX; prevY = e.clientY;
});
renderer.domElement.addEventListener('mouseup', ()=>isDragging=false);
renderer.domElement.addEventListener('wheel', e=>{
  tCamZ = Math.max(2, Math.min(12, tCamZ + e.deltaY * 0.005));
});

// Touch
let lastPinch = null;
renderer.domElement.addEventListener('touchstart', e=>{
  if(e.touches.length===1){ isDragging=true; prevX=e.touches[0].clientX; prevY=e.touches[0].clientY; }
},{passive:true});
renderer.domElement.addEventListener('touchmove', e=>{
  if(e.touches.length===1 && isDragging){
    tRY += (e.touches[0].clientX - prevX) * 0.01;
    tRX += (e.touches[0].clientY - prevY) * 0.008;
    tRX = Math.max(-Math.PI/2, Math.min(Math.PI/2, tRX));
    prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
  }
  if(e.touches.length===2){
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    if(lastPinch) tCamZ = Math.max(2, Math.min(12, tCamZ + (lastPinch-d)*0.02));
    lastPinch = d;
  }
},{passive:true});
renderer.domElement.addEventListener('touchend', ()=>{ isDragging=false; lastPinch=null; },{passive:true});

function resetView(){ tRX=0.2; tRY=0.3; tCamZ=5; autoSpin=false; }
function toggleSpin(){ autoSpin=!autoSpin; }
function toggleWire(){
  wireMode=!wireMode;
  pivotGroup.traverse(obj=>{
    if(obj.isMesh && obj.material && obj.material.map){
      obj.material.wireframe = wireMode;
    }
  });
}

// ====== RENDER ======
function animate(){
  requestAnimationFrame(animate);
  rotX += (tRX - rotX) * 0.08;
  rotY += (tRY - rotY) * 0.08;
  camZ += (tCamZ - camZ) * 0.08;
  if(autoSpin) tRY += 0.008;
  pivotGroup.rotation.x = rotX;
  pivotGroup.rotation.y = rotY;
  camera.position.z = camZ;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize',()=>{
  const W=container.clientWidth, H=container.clientHeight;
  camera.aspect=W/H; camera.updateProjectionMatrix(); renderer.setSize(W,H);
});

setTimeout(()=>document.getElementById('hint').style.opacity='0', 4000);
</script>
</body>
</html>
