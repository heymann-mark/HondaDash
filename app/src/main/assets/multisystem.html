<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100vw; height:100vh; overflow:hidden; font-family:'Share Tech Mono',monospace; background:#0a0000; color:#fff; }

/* Status bar */
.status-bar {
  height:32px; background:#0d0000; border-bottom:1px solid #cc110033;
  display:flex; align-items:center; padding:0 16px; gap:16px;
}
.status-dot { width:8px; height:8px; border-radius:50%; background:#cc220044; }
.status-dot.connected { background:#00ff41; box-shadow:0 0 6px #00ff41; }
.status-title { font-size:11px; color:#cc220088; letter-spacing:3px; font-family:'Orbitron',monospace; }
.status-text { font-size:10px; color:#ffffff44; letter-spacing:2px; margin-left:auto; }

/* Main layout */
.main { display:flex; height:calc(100vh - 32px); }

/* Module sidebar */
.sidebar {
  width:180px; min-width:180px; background:#0d0000; border-right:1px solid #cc110022;
  overflow-y:auto; overflow-x:hidden;
}
.sidebar::-webkit-scrollbar { width:3px; }
.sidebar::-webkit-scrollbar-thumb { background:#cc220044; border-radius:2px; }
.sidebar::-webkit-scrollbar-track { background:transparent; }

.module-header {
  padding:10px 12px 8px; font-size:10px; letter-spacing:2px; cursor:pointer;
  border-bottom:1px solid #cc110011; display:flex; align-items:center; gap:8px;
  transition:background 0.15s;
}
.module-header:hover { background:#ffffff06; }
.module-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.module-arrow { font-size:8px; margin-left:auto; color:#ffffff33; transition:transform 0.2s; }
.module-header.open .module-arrow { transform:rotate(90deg); }
.module-header.open { background:#ffffff04; }

.pid-list { display:none; }
.pid-list.open { display:block; }

.pid-item {
  padding:6px 12px 6px 28px; font-size:9px; letter-spacing:1px; color:#ffffff44;
  cursor:pointer; transition:all 0.12s; display:flex; align-items:center; gap:6px;
  border-bottom:1px solid #cc110008;
}
.pid-item:hover { background:#ffffff06; color:#ffffff88; }
.pid-item.selected { color:#ffffffcc; background:#ffffff08; }
.pid-item .pid-check { width:6px; height:6px; border:1px solid #ffffff22; border-radius:2px; flex-shrink:0; }
.pid-item.selected .pid-check { border-color:var(--mc); background:var(--mc); }

/* Right content area */
.content { flex:1; display:flex; flex-direction:column; min-width:0; }

/* Hero gauges */
.gauges-row {
  display:flex; height:110px; border-bottom:1px solid #cc110022; flex-shrink:0;
}
.gauge-cell {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  border-right:1px solid #cc110022; position:relative;
}
.gauge-cell:last-child { border-right:none; }
.gauge-cell.empty { opacity:0.2; }
.gauge-module-badge {
  font-size:7px; letter-spacing:1px; padding:1px 5px; border-radius:2px;
  position:absolute; top:8px; right:8px; border:1px solid;
}
.gauge-label { font-size:8px; color:#ffffff33; letter-spacing:2px; margin-bottom:2px; }
.gauge-value { font-family:'Orbitron',monospace; font-size:30px; color:#ffffffdd; letter-spacing:2px; }
.gauge-unit { font-size:9px; color:#ffffff22; letter-spacing:1px; margin-top:1px; }
.gauge-bar { position:absolute; bottom:0; left:0; right:0; height:3px; background:#cc110011; }
.gauge-bar-fill { height:3px; transition:width 0.15s; }

/* Graph area */
.graph-area { position:relative; flex:1; min-height:0; }
.graph-canvas { width:100%; height:100%; }

/* Active PID toggle bar */
.toggle-bar {
  height:40px; background:#0d0000; border-top:1px solid #cc110022;
  display:flex; align-items:center; padding:0 8px; gap:4px; overflow-x:auto; flex-shrink:0;
}
.toggle-bar::-webkit-scrollbar { display:none; }
.pid-toggle {
  background:transparent; border:1px solid #ffffff11; color:#ffffff44;
  font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:1px;
  padding:3px 8px; cursor:pointer; white-space:nowrap; border-radius:3px;
  transition:all 0.15s; flex-shrink:0; display:flex; align-items:center; gap:4px;
}
.pid-toggle.active { border-color:var(--c); color:var(--c); background:rgba(255,255,255,0.03); }
.pid-toggle .mod-tag { font-size:6px; opacity:0.5; }

.no-selection {
  flex:1; display:flex; align-items:center; justify-content:center;
  color:#ffffff15; font-size:12px; letter-spacing:3px;
}

.clear-btn {
  background:transparent; border:1px solid #cc220033; color:#cc220066;
  font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px;
  padding:3px 12px; cursor:pointer; margin-left:auto; flex-shrink:0; border-radius:3px;
}
.clear-btn:hover { border-color:#cc2200; color:#cc2200; }
</style>
</head>
<body>

<div class="status-bar">
  <div class="status-dot" id="conn-dot"></div>
  <div class="status-title">MULTI-SYSTEM STREAM</div>
  <div class="status-text" id="conn-text">OBD NOT CONNECTED - SIMULATED DATA</div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content">
    <div class="gauges-row" id="gauges-row">
      <div class="gauge-cell empty" id="hero-0"><div class="gauge-label">--</div><div class="gauge-value">-</div><div class="gauge-unit"></div></div>
      <div class="gauge-cell empty" id="hero-1"><div class="gauge-label">--</div><div class="gauge-value">-</div><div class="gauge-unit"></div></div>
      <div class="gauge-cell empty" id="hero-2"><div class="gauge-label">--</div><div class="gauge-value">-</div><div class="gauge-unit"></div></div>
      <div class="gauge-cell empty" id="hero-3"><div class="gauge-label">--</div><div class="gauge-value">-</div><div class="gauge-unit"></div></div>
    </div>
    <div class="graph-area">
      <canvas class="graph-canvas" id="graph"></canvas>
    </div>
    <div class="toggle-bar" id="toggle-bar">
      <div class="no-selection" id="no-sel">SELECT PIDS FROM MODULES</div>
      <button class="clear-btn" id="clear-btn" onclick="clearAll()" style="display:none">CLEAR</button>
    </div>
  </div>
</div>

<script>
// ============ MODULE DEFINITIONS ============
const MODULES = {
  ECM: {
    label: 'ECM', fullName: 'ENGINE CONTROL', color: '#cc2200',
    pids: {
      rpm:   { label:'RPM',          min:0,   max:9000, unit:'REV/MIN', val:0 },
      spd:   { label:'SPEED',        min:0,   max:160,  unit:'MPH',     val:0 },
      tps:   { label:'THROTTLE',     min:0,   max:100,  unit:'%',       val:0 },
      map:   { label:'MAP',          min:0,   max:250,  unit:'KPA',     val:101 },
      iat:   { label:'INTAKE TEMP',  min:30,  max:180,  unit:'°F',      val:75 },
      ect:   { label:'COOLANT',      min:100, max:250,  unit:'°F',      val:185 },
      ign:   { label:'TIMING',       min:-10, max:50,   unit:'°BTDC',   val:15 },
      stft:  { label:'FUEL TRIM ST', min:-25, max:25,   unit:'%',       val:0 },
      ltft:  { label:'FUEL TRIM LT', min:-25, max:25,   unit:'%',       val:0 },
      inj:   { label:'INJECTOR',     min:0,   max:100,  unit:'%',       val:0 },
      afr:   { label:'AFR',          min:10,  max:20,   unit:'λ',       val:14.7 },
      vtec:  { label:'VTEC',         min:0,   max:1,    unit:'ON/OFF',  val:0 },
    }
  },
  TCM: {
    label: 'TCM', fullName: 'TRANSMISSION', color: '#00cc88',
    pids: {
      gear:    { label:'GEAR POS',     min:0,  max:6,    unit:'',     val:1 },
      iss:     { label:'INPUT SHAFT',  min:0,  max:9000, unit:'RPM',  val:0 },
      oss:     { label:'OUTPUT SHAFT', min:0,  max:6000, unit:'RPM',  val:0 },
      tslip:   { label:'TC SLIP',      min:0,  max:500,  unit:'RPM',  val:0 },
      tft:     { label:'TRANS TEMP',   min:60, max:300,  unit:'°F',   val:160 },
      solA:    { label:'SHIFT SOL A',  min:0,  max:1,    unit:'ON/OFF', val:0 },
      solB:    { label:'SHIFT SOL B',  min:0,  max:1,    unit:'ON/OFF', val:0 },
    }
  },
  ABS: {
    label: 'ABS', fullName: 'ANTI-LOCK BRAKE', color: '#4488ff',
    pids: {
      wsFL:   { label:'WHEEL FL',    min:0,  max:160, unit:'MPH',    val:0 },
      wsFR:   { label:'WHEEL FR',    min:0,  max:160, unit:'MPH',    val:0 },
      wsRL:   { label:'WHEEL RL',    min:0,  max:160, unit:'MPH',    val:0 },
      wsRR:   { label:'WHEEL RR',    min:0,  max:160, unit:'MPH',    val:0 },
      brkPsi: { label:'BRAKE PSI',   min:0,  max:2000, unit:'PSI',   val:0 },
      absAct: { label:'ABS ACTIVE',  min:0,  max:1,   unit:'ON/OFF', val:0 },
      vsaAct: { label:'VSA ACTIVE',  min:0,  max:1,   unit:'ON/OFF', val:0 },
      yaw:    { label:'YAW RATE',    min:-60, max:60,  unit:'°/S',   val:0 },
    }
  },
  BCM: {
    label: 'BCM', fullName: 'BODY CONTROL', color: '#ffaa00',
    pids: {
      batt:    { label:'BATTERY',     min:10, max:16,  unit:'V',      val:12.6 },
      altLoad: { label:'ALT LOAD',    min:0,  max:100, unit:'%',      val:30 },
      hdlamp:  { label:'HEADLIGHTS',  min:0,  max:1,   unit:'ON/OFF', val:0 },
      fanRly:  { label:'FAN RELAY',   min:0,  max:1,   unit:'ON/OFF', val:0 },
      acClut:  { label:'AC CLUTCH',   min:0,  max:1,   unit:'ON/OFF', val:0 },
      fuelPmp: { label:'FUEL PUMP',   min:0,  max:1,   unit:'ON/OFF', val:1 },
      brkSw:   { label:'BRAKE SW',    min:0,  max:1,   unit:'ON/OFF', val:0 },
    }
  }
};

// State
const selected = {}; // key: "MOD.pid", value: { module, pid, color, history:[], visible:true }
const MAX_HISTORY = 600;
let heroSlots = [null, null, null, null]; // up to 4 hero gauges

// PID color palette per module (cycle through shades)
function pidColor(modColor, index) {
  // Shift hue slightly for each PID in a module
  const r = parseInt(modColor.slice(1,3),16);
  const g = parseInt(modColor.slice(3,5),16);
  const b = parseInt(modColor.slice(5,7),16);
  const shift = (index * 35) % 180;
  const nr = Math.min(255, r + shift) % 256;
  const ng = Math.min(255, g + shift) % 256;
  const nb = Math.min(255, b + shift) % 256;
  // Keep it vivid: blend toward module color
  const fr = Math.round(nr * 0.5 + r * 0.5);
  const fg = Math.round(ng * 0.5 + g * 0.5);
  const fb = Math.round(nb * 0.5 + b * 0.5);
  return '#' + [fr,fg,fb].map(c => c.toString(16).padStart(2,'0')).join('');
}

// ============ BUILD SIDEBAR ============
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  Object.entries(MODULES).forEach(([modKey, mod]) => {
    const header = document.createElement('div');
    header.className = 'module-header';
    header.innerHTML = `<div class="module-dot" style="background:${mod.color};box-shadow:0 0 4px ${mod.color}44"></div>
      <span style="color:${mod.color}">${mod.label}</span>
      <span style="color:#ffffff33;font-size:7px;letter-spacing:1px">${mod.fullName}</span>
      <span class="module-arrow">▶</span>`;

    const list = document.createElement('div');
    list.className = 'pid-list';

    header.onclick = () => {
      header.classList.toggle('open');
      list.classList.toggle('open');
    };

    let pidIdx = 0;
    Object.entries(mod.pids).forEach(([pidKey, pid]) => {
      const item = document.createElement('div');
      item.className = 'pid-item';
      item.style.setProperty('--mc', mod.color);
      const key = modKey + '.' + pidKey;
      if (selected[key]) item.classList.add('selected');
      item.innerHTML = `<div class="pid-check"></div>${pid.label}`;
      item.onclick = () => togglePid(modKey, pidKey, pidIdx, item);
      list.appendChild(item);
      pidIdx++;
    });

    sb.appendChild(header);
    sb.appendChild(list);
  });
}

function togglePid(modKey, pidKey, pidIdx, el) {
  const key = modKey + '.' + pidKey;
  if (selected[key]) {
    delete selected[key];
    el.classList.remove('selected');
    // Remove from hero slots
    heroSlots = heroSlots.map(h => h === key ? null : h);
  } else {
    const mod = MODULES[modKey];
    const pid = mod.pids[pidKey];
    selected[key] = {
      module: modKey, pid: pidKey,
      color: pidColor(mod.color, pidIdx),
      modColor: mod.color,
      label: pid.label, unit: pid.unit,
      min: pid.min, max: pid.max,
      history: [], visible: true
    };
    // Add to first empty hero slot
    const emptySlot = heroSlots.indexOf(null);
    if (emptySlot >= 0) heroSlots[emptySlot] = key;
  }
  buildToggleBar();
  updateHeroGauges();
}

// ============ TOGGLE BAR ============
function buildToggleBar() {
  const bar = document.getElementById('toggle-bar');
  const noSel = document.getElementById('no-sel');
  const clearBtn = document.getElementById('clear-btn');
  // Remove old toggles
  bar.querySelectorAll('.pid-toggle').forEach(e => e.remove());

  const keys = Object.keys(selected);
  noSel.style.display = keys.length ? 'none' : '';
  clearBtn.style.display = keys.length ? '' : 'none';

  keys.forEach(key => {
    const s = selected[key];
    const btn = document.createElement('button');
    btn.className = 'pid-toggle' + (s.visible ? ' active' : '');
    btn.style.setProperty('--c', s.color);
    btn.innerHTML = `<span class="mod-tag">${s.module}</span>${s.label}`;
    btn.onclick = () => {
      s.visible = !s.visible;
      btn.classList.toggle('active', s.visible);
    };
    bar.insertBefore(btn, clearBtn);
  });
}

function clearAll() {
  Object.keys(selected).forEach(k => delete selected[k]);
  heroSlots = [null, null, null, null];
  buildSidebar();
  buildToggleBar();
  updateHeroGauges();
}

// ============ HERO GAUGES ============
function updateHeroGauges() {
  for (let i = 0; i < 4; i++) {
    const cell = document.getElementById('hero-' + i);
    const key = heroSlots[i];
    if (!key || !selected[key]) {
      cell.className = 'gauge-cell empty';
      cell.innerHTML = '<div class="gauge-label">--</div><div class="gauge-value">-</div><div class="gauge-unit"></div>';
      continue;
    }
    const s = selected[key];
    const mod = MODULES[s.module];
    const pid = mod.pids[s.pid];
    const pct = Math.max(0, Math.min(100, ((pid.val - s.min) / (s.max - s.min)) * 100));
    cell.className = 'gauge-cell';
    cell.innerHTML = `
      <div class="gauge-module-badge" style="color:${s.modColor};border-color:${s.modColor}44">${s.module}</div>
      <div class="gauge-label">${s.label}</div>
      <div class="gauge-value" style="color:${s.color}">${formatVal(pid.val)}</div>
      <div class="gauge-unit">${s.unit}</div>
      <div class="gauge-bar"><div class="gauge-bar-fill" style="width:${pct}%;background:${s.color}"></div></div>`;
  }
}

function formatVal(v) {
  if (typeof v === 'number') return v % 1 === 0 ? v : v.toFixed(1);
  return v;
}

// ============ SIMULATION ============
let simTime = 0;
let simGear = 1;
let simRPM = 800;
let simSpeed = 0;
let simThrottle = 0;

function simUpdate() {
  simTime += 0.1;
  const cycle = simTime % 30;

  if (cycle < 8) {
    simThrottle = 60 + Math.sin(simTime * 0.5) * 30;
    simRPM = Math.min(8000, simRPM + (simThrottle * 3));
    if (simRPM > 7500) { simRPM = 3500; simGear = Math.min(6, simGear + 1); }
  } else if (cycle < 12) {
    simThrottle = 15 + Math.sin(simTime * 2) * 5;
    simRPM = 3000 + Math.sin(simTime * 0.3) * 500;
  } else if (cycle < 18) {
    simThrottle = 85 + Math.sin(simTime * 0.8) * 15;
    simRPM = Math.min(8200, simRPM + (simThrottle * 5));
    if (simRPM > 7800) { simRPM = 4000; simGear = Math.min(6, simGear + 1); }
  } else if (cycle < 22) {
    simThrottle = 0;
    simRPM = Math.max(800, simRPM - 400);
    simGear = Math.max(1, Math.floor(simRPM / 1500));
  } else {
    simThrottle = 5 + Math.random() * 3;
    simRPM = 800 + Math.sin(simTime * 3) * 50;
    simGear = 1;
    simSpeed = Math.max(0, simSpeed - 2);
  }
  simSpeed = Math.max(0, Math.min(150, simRPM * simGear * 0.003));
  const vtecOn = simRPM > 5800 ? 1 : 0;
  const knock = simRPM > 7000 && simThrottle > 80 ? Math.floor(Math.random() * 3) : 0;
  const braking = simThrottle === 0 && cycle >= 18 && cycle < 22;

  // ECM
  const ecm = MODULES.ECM.pids;
  ecm.rpm.val = Math.round(simRPM);
  ecm.spd.val = Math.round(simSpeed);
  ecm.tps.val = Math.round(simThrottle);
  ecm.map.val = Math.round(30 + simThrottle * 1.7 + Math.random() * 5);
  ecm.iat.val = Math.round(75 + Math.sin(simTime * 0.1) * 8);
  ecm.ect.val = Math.round(185 + Math.sin(simTime * 0.05) * 10 + (simThrottle > 50 ? 5 : 0));
  ecm.ign.val = parseFloat((15 + (simRPM / 1000) * 2 - knock * 3 + Math.sin(simTime) * 2).toFixed(1));
  ecm.stft.val = parseFloat((Math.sin(simTime * 1.5) * 4).toFixed(1));
  ecm.ltft.val = parseFloat((Math.sin(simTime * 0.1) * 3 + 1).toFixed(1));
  ecm.inj.val = Math.round(simThrottle * 0.6 + simRPM / 200 + Math.random() * 5);
  ecm.afr.val = parseFloat((14.7 - (simThrottle / 100) * 2.5 + Math.sin(simTime * 2) * 0.3).toFixed(1));
  ecm.vtec.val = vtecOn;

  // TCM - derived from ECM state
  const tcm = MODULES.TCM.pids;
  tcm.gear.val = simGear;
  tcm.iss.val = Math.round(simRPM * 0.95 + Math.random() * 20);
  tcm.oss.val = Math.round(simRPM / (simGear * 0.8 + 0.5));
  tcm.tslip.val = Math.round(Math.max(0, tcm.iss.val - tcm.oss.val * (simGear * 0.8 + 0.5) / 0.95));
  tcm.tft.val = Math.round(160 + Math.sin(simTime * 0.03) * 15 + (simThrottle > 60 ? 10 : 0));
  tcm.solA.val = (simGear <= 2) ? 1 : 0;
  tcm.solB.val = (simGear >= 3) ? 1 : 0;

  // ABS - wheel speeds from vehicle speed
  const abs = MODULES.ABS.pids;
  const baseWS = simSpeed;
  abs.wsFL.val = Math.round(baseWS + (Math.random() - 0.5) * 1.5);
  abs.wsFR.val = Math.round(baseWS + (Math.random() - 0.5) * 1.5);
  abs.wsRL.val = Math.round(baseWS + (Math.random() - 0.5) * 1.0);
  abs.wsRR.val = Math.round(baseWS + (Math.random() - 0.5) * 1.0);
  abs.brkPsi.val = braking ? Math.round(800 + Math.random() * 400) : 0;
  abs.absAct.val = 0;
  abs.vsaAct.val = 0;
  abs.yaw.val = parseFloat((Math.sin(simTime * 0.7) * 5).toFixed(1));

  // BCM
  const bcm = MODULES.BCM.pids;
  bcm.batt.val = parseFloat((12.4 + Math.sin(simTime * 0.2) * 0.3 + (simRPM > 1500 ? 1.2 : 0)).toFixed(1));
  bcm.altLoad.val = Math.round(30 + simThrottle * 0.3 + Math.random() * 5);
  bcm.hdlamp.val = 1;
  bcm.fanRly.val = ecm.ect.val > 200 ? 1 : 0;
  bcm.acClut.val = 0;
  bcm.fuelPmp.val = 1;
  bcm.brkSw.val = braking ? 1 : 0;

  // Push history for selected PIDs
  Object.entries(selected).forEach(([key, s]) => {
    const pid = MODULES[s.module].pids[s.pid];
    s.history.push(pid.val);
    if (s.history.length > MAX_HISTORY) s.history.shift();
  });
}

// ============ GRAPH ============
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');

function resizeGraph() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
}
resizeGraph();
window.addEventListener('resize', resizeGraph);

function drawGraph() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#0a0000';
  ctx.fillRect(0, 0, W, H);

  const entries = Object.entries(selected).filter(([,s]) => s.visible && s.history.length >= 2);
  if (entries.length === 0) {
    ctx.fillStyle = '#ffffff0a';
    ctx.font = '12px Share Tech Mono';
    ctx.textAlign = 'center';
    ctx.fillText('SELECT PIDS TO BEGIN STREAMING', W / 2, H / 2);
    ctx.textAlign = 'start';
    return;
  }

  // Grid
  ctx.strokeStyle = '#ffffff08';
  ctx.lineWidth = 1;
  for (let i = 1; i < 5; i++) {
    const y = (i / 5) * H;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  const maxLen = Math.max(...entries.map(([,s]) => s.history.length));
  for (let i = 0; i < maxLen; i += 30) {
    const x = (i / Math.max(1, maxLen - 1)) * W;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }

  // Draw traces
  entries.forEach(([key, s]) => {
    const points = s.history.slice(-300);
    const len = points.length;

    ctx.beginPath();
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = s.color;
    ctx.shadowBlur = 4;

    for (let i = 0; i < len; i++) {
      const x = (i / Math.max(1, len - 1)) * W;
      const norm = (points[i] - s.min) / (s.max - s.min);
      const y = H - (Math.max(0, Math.min(1, norm)) * (H - 20)) - 10;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Label
    const lastVal = points[len - 1];
    const lastNorm = (lastVal - s.min) / (s.max - s.min);
    const lastY = H - (Math.max(0, Math.min(1, lastNorm)) * (H - 20)) - 10;
    ctx.fillStyle = s.color;
    ctx.font = '9px Share Tech Mono';
    ctx.fillText(s.module + ':' + s.label + ' ' + formatVal(lastVal), W - 120, lastY - 4);
  });
}

// ============ BRIDGE (for Kotlin) ============
function updateFromOBD(modKey, pidKey, value) {
  if (MODULES[modKey] && MODULES[modKey].pids[pidKey]) {
    MODULES[modKey].pids[pidKey].val = value;
  }
  document.getElementById('conn-dot').classList.add('connected');
  document.getElementById('conn-text').textContent = 'OBD CONNECTED';
}

// ============ MAIN LOOP ============
buildSidebar();

setInterval(simUpdate, 100);
requestAnimationFrame(function render() {
  updateHeroGauges();
  drawGraph();
  requestAnimationFrame(render);
});
</script>
