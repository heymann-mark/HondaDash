<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100vw; height:100vh; overflow:hidden; font-family:'Share Tech Mono',monospace; background:#0a0000; color:#fff; }

/* Status bar */
.status-bar {
  height:32px; background:#0d0000; border-bottom:1px solid #cc110033;
  display:flex; align-items:center; padding:0 16px; gap:16px;
}
.status-dot { width:8px; height:8px; border-radius:50%; background:#cc220044; }
.status-dot.connected { background:#00ff41; box-shadow:0 0 6px #00ff41; }
.status-title { font-size:11px; color:#cc220088; letter-spacing:3px; font-family:'Orbitron',monospace; }
.status-text { font-size:10px; color:#ffffff44; letter-spacing:2px; margin-left:auto; }

/* Main layout */
.main { display:flex; height:calc(100vh - 32px); }

/* Module sidebar */
.sidebar {
  width:180px; min-width:180px; background:#0d0000; border-right:1px solid #cc110022;
  overflow-y:auto; overflow-x:hidden;
}
.sidebar::-webkit-scrollbar { width:3px; }
.sidebar::-webkit-scrollbar-thumb { background:#cc220044; border-radius:2px; }
.sidebar::-webkit-scrollbar-track { background:transparent; }

.module-header {
  padding:10px 12px 8px; font-size:10px; letter-spacing:2px; cursor:pointer;
  border-bottom:1px solid #cc110011; display:flex; align-items:center; gap:8px;
  transition:background 0.15s;
}
.module-header:hover { background:#ffffff06; }
.module-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.module-arrow { font-size:8px; margin-left:auto; color:#ffffff33; transition:transform 0.2s; }
.module-header.open .module-arrow { transform:rotate(90deg); }
.module-header.open { background:#ffffff04; }

.pid-list { display:none; }
.pid-list.open { display:block; }

.pid-item {
  padding:6px 12px 6px 28px; font-size:9px; letter-spacing:1px; color:#ffffff44;
  cursor:pointer; transition:all 0.12s; display:flex; align-items:center; gap:6px;
  border-bottom:1px solid #cc110008;
}
.pid-item:hover { background:#ffffff06; color:#ffffff88; }
.pid-item.selected { color:#ffffffcc; background:#ffffff08; }
.pid-item .pid-check { width:6px; height:6px; border:1px solid #ffffff22; border-radius:2px; flex-shrink:0; }
.pid-item.selected .pid-check { border-color:var(--mc); background:var(--mc); }

/* Right content area */
.content { flex:1; display:flex; flex-direction:column; min-width:0; }

/* Hero gauges */
.gauges-row {
  display:flex; height:110px; border-bottom:1px solid #cc110022; flex-shrink:0;
}
.gauge-cell {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  border-right:1px solid #cc110022; position:relative;
}
.gauge-cell:last-child { border-right:none; }
.gauge-cell.empty { opacity:0.2; }
.gauge-module-badge {
  font-size:7px; letter-spacing:1px; padding:1px 5px; border-radius:2px;
  position:absolute; top:8px; right:8px; border:1px solid;
}
.gauge-label { font-size:8px; color:#ffffff33; letter-spacing:2px; margin-bottom:2px; }
.gauge-value { font-family:'Orbitron',monospace; font-size:30px; color:#ffffffdd; letter-spacing:2px; }
.gauge-unit { font-size:9px; color:#ffffff22; letter-spacing:1px; margin-top:1px; }
.gauge-bar { position:absolute; bottom:0; left:0; right:0; height:3px; background:#cc110011; }
.gauge-bar-fill { height:3px; transition:width 0.15s; }

/* Graph area */
.graph-area { position:relative; flex:1; min-height:0; }
.graph-canvas { width:100%; height:100%; }

/* Active PID toggle bar */
.toggle-bar {
  height:40px; background:#0d0000; border-top:1px solid #cc110022;
  display:flex; align-items:center; padding:0 8px; gap:4px; overflow-x:auto; flex-shrink:0;
}
.toggle-bar::-webkit-scrollbar { display:none; }
.pid-toggle {
  background:transparent; border:1px solid #ffffff11; color:#ffffff44;
  font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:1px;
  padding:3px 8px; cursor:pointer; white-space:nowrap; border-radius:3px;
  transition:all 0.15s; flex-shrink:0; display:flex; align-items:center; gap:4px;
}
.pid-toggle.active { border-color:var(--c); color:var(--c); background:rgba(255,255,255,0.03); }
.pid-toggle .mod-tag { font-size:6px; opacity:0.5; }

.no-selection {
  flex:1; display:flex; align-items:center; justify-content:center;
  color:#ffffff15; font-size:12px; letter-spacing:3px;
}

.clear-btn {
  background:transparent; border:1px solid #cc220033; color:#cc220066;
  font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px;
  padding:3px 12px; cursor:pointer; margin-left:auto; flex-shrink:0; border-radius:3px;
}
.clear-btn:hover { border-color:#cc2200; color:#cc2200; }
</style>
</head>
<body>

<div class="status-bar">
  <div class="status-dot" id="conn-dot"></div>
  <div class="status-title">LIVE DATA STREAM</div>
  <div class="status-text" id="conn-text">FLASHPRO NOT CONNECTED - SIMULATED</div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content">
    <div class="gauges-row" id="gauges-row">
      <div class="gauge-cell empty" id="hero-0"><div class="gauge-label">--</div><div class="gauge-value">-</div><div class="gauge-unit"></div></div>
      <div class="gauge-cell empty" id="hero-1"><div class="gauge-label">--</div><div class="gauge-value">-</div><div class="gauge-unit"></div></div>
      <div class="gauge-cell empty" id="hero-2"><div class="gauge-label">--</div><div class="gauge-value">-</div><div class="gauge-unit"></div></div>
      <div class="gauge-cell empty" id="hero-3"><div class="gauge-label">--</div><div class="gauge-value">-</div><div class="gauge-unit"></div></div>
    </div>
    <div class="graph-area">
      <canvas class="graph-canvas" id="graph"></canvas>
    </div>
    <div class="toggle-bar" id="toggle-bar">
      <div class="no-selection" id="no-sel">SELECT PIDS FROM SENSORS</div>
      <button class="clear-btn" id="clear-btn" onclick="clearAll()" style="display:none">CLEAR</button>
    </div>
  </div>
</div>

<script>
// ============ SENSOR DEFINITIONS ============
const SENSORS = {
  ENGINE: {
    label: 'ENGINE', fullName: 'ENGINE',
    pids: {
      rpm:   { label:'RPM',          min:0,   max:9000, unit:'RPM',    val:850 },
      map:   { label:'MAP',          min:0,   max:255,  unit:'KPA',    val:35 },
      tpedal:{ label:'THROTTLE',     min:0,   max:100,  unit:'%',      val:0 },
      tplate:{ label:'PLATE POS',    min:0,   max:100,  unit:'%',      val:0 },
      vss:   { label:'SPEED',        min:0,   max:180,  unit:'MPH',    val:0 },
      gear:  { label:'GEAR',         min:0,   max:6,    unit:'',       val:0 },
    }
  },
  FUEL: {
    label: 'FUEL', fullName: 'FUEL SYSTEM',
    pids: {
      inj:   { label:'INJ DURATION', min:0,   max:30,   unit:'MS',     val:2.1 },
      duty:  { label:'INJ DUTY',     min:0,   max:100,  unit:'%',      val:8 },
      afr:   { label:'AFR',          min:10,  max:20,   unit:':1',     val:14.7 },
      afm:   { label:'AFM VOLTS',    min:0,   max:5,    unit:'V',      val:0.8 },
      strim: { label:'SHORT TRIM',   min:-25, max:25,   unit:'%',      val:0 },
      ltrim: { label:'LONG TRIM',    min:-15, max:15,   unit:'%',      val:0 },
      fstat: { label:'FUEL STATUS',  min:0,   max:8,    unit:'',       val:2 },
    }
  },
  IGNITION: {
    label: 'IGN', fullName: 'IGNITION / KNOCK',
    pids: {
      ign:    { label:'TIMING',      min:-10, max:50,   unit:'°BTDC',  val:15 },
      kcount: { label:'KNOCK COUNT', min:0,   max:50,   unit:'',       val:0 },
      klevel: { label:'KNOCK LEVEL', min:0,   max:100,  unit:'%',      val:0 },
      kretard:{ label:'KNOCK RETARD',min:0,   max:15,   unit:'°',      val:0 },
    }
  },
  VTEC: {
    label: 'VTEC', fullName: 'VTEC / VTC',
    pids: {
      vts:    { label:'VTEC STATUS', min:0,   max:1,    unit:'ON/OFF', val:0 },
      cam:    { label:'CAM ACTUAL',  min:0,   max:50,   unit:'°',      val:0 },
      camcmd: { label:'CAM COMMAND', min:0,   max:50,   unit:'°',      val:0 },
    }
  },
  TEMPS: {
    label: 'TEMP', fullName: 'TEMPERATURES',
    pids: {
      ect:   { label:'COOLANT',      min:-40, max:300,  unit:'°F',     val:185 },
      iat:   { label:'INTAKE AIR',   min:-40, max:300,  unit:'°F',     val:85 },
    }
  },
  ELECTRICAL: {
    label: 'ELEC', fullName: 'ELECTRICAL',
    pids: {
      bat:   { label:'BATTERY',      min:10,  max:16,   unit:'V',      val:14.2 },
      pa:    { label:'ATMOS PRESS',  min:70,  max:110,  unit:'KPA',    val:101 },
    }
  }
};

// State
const selected = {}; // key: "GROUP.pid", value: { group, pid, color, dash, history:[], visible:true }
const MAX_HISTORY = 600;
let heroSlots = [null, null, null, null]; // up to 4 hero gauges

// Master color palette — maximally distinct colors
const COLOR_PALETTE = [
  '#ff4444',  // red
  '#33bbee',  // cyan
  '#ffdd33',  // yellow
  '#ee77ff',  // magenta
  '#44ff88',  // green
  '#ff8833',  // orange
  '#7788ff',  // blue
  '#ffaacc',  // pink
  '#88ffee',  // teal
  '#ddff44',  // lime
];

// Line styles for when we run out of distinct colors
const LINE_STYLES = [
  [],           // solid
  [8, 4],       // dashed
  [2, 4],       // dotted
  [12, 4, 2, 4],// dash-dot
];

let nextColorIndex = 0;

function getNextStyle() {
  const colorIdx = nextColorIndex % COLOR_PALETTE.length;
  const styleIdx = Math.floor(nextColorIndex / COLOR_PALETTE.length) % LINE_STYLES.length;
  nextColorIndex++;
  return {
    color: COLOR_PALETTE[colorIdx],
    dash: LINE_STYLES[styleIdx]
  };
}

function releaseStyle() {
  // Recalculate nextColorIndex from currently selected count
  nextColorIndex = Object.keys(selected).length;
}

// ============ BUILD SIDEBAR ============
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  Object.entries(SENSORS).forEach(([grpKey, grp]) => {
    const header = document.createElement('div');
    header.className = 'module-header';
    header.innerHTML = `<div class="module-dot" style="background:#ffffff55;box-shadow:0 0 4px #ffffff22"></div>
      <span style="color:#ffffffaa">${grp.label}</span>
      <span style="color:#ffffff33;font-size:7px;letter-spacing:1px">${grp.fullName}</span>
      <span class="module-arrow">▶</span>`;

    const list = document.createElement('div');
    list.className = 'pid-list';

    header.onclick = () => {
      header.classList.toggle('open');
      list.classList.toggle('open');
    };

    Object.entries(grp.pids).forEach(([pidKey, pid]) => {
      const item = document.createElement('div');
      item.className = 'pid-item';
      const key = grpKey + '.' + pidKey;
      const sel = selected[key];
      if (sel) {
        item.classList.add('selected');
        item.style.setProperty('--mc', sel.color);
      } else {
        item.style.setProperty('--mc', '#ffffff55');
      }
      item.innerHTML = `<div class="pid-check"></div>${pid.label}`;
      item.onclick = () => togglePid(grpKey, pidKey, item);
      list.appendChild(item);
    });

    sb.appendChild(header);
    sb.appendChild(list);
  });
}

function togglePid(grpKey, pidKey, el) {
  const key = grpKey + '.' + pidKey;
  if (selected[key]) {
    delete selected[key];
    el.classList.remove('selected');
    releaseStyle();
    // Remove from hero slots
    heroSlots = heroSlots.map(h => h === key ? null : h);
  } else {
    const grp = SENSORS[grpKey];
    const pid = grp.pids[pidKey];
    const style = getNextStyle();
    selected[key] = {
      group: grpKey, pid: pidKey,
      color: style.color, dash: style.dash,
      label: pid.label, unit: pid.unit,
      min: pid.min, max: pid.max,
      history: [], visible: true
    };
    // Add to first empty hero slot
    const emptySlot = heroSlots.indexOf(null);
    if (emptySlot >= 0) heroSlots[emptySlot] = key;
  }
  buildSidebar();
  buildToggleBar();
  updateHeroGauges();
}

// ============ TOGGLE BAR ============
function buildToggleBar() {
  const bar = document.getElementById('toggle-bar');
  const noSel = document.getElementById('no-sel');
  const clearBtn = document.getElementById('clear-btn');
  // Remove old toggles
  bar.querySelectorAll('.pid-toggle').forEach(e => e.remove());

  const keys = Object.keys(selected);
  noSel.style.display = keys.length ? 'none' : '';
  clearBtn.style.display = keys.length ? '' : 'none';

  keys.forEach(key => {
    const s = selected[key];
    const btn = document.createElement('button');
    btn.className = 'pid-toggle' + (s.visible ? ' active' : '');
    btn.style.setProperty('--c', s.color);
    btn.innerHTML = `<span class="mod-tag">${s.group}</span>${s.label}`;
    btn.onclick = () => {
      s.visible = !s.visible;
      btn.classList.toggle('active', s.visible);
    };
    bar.insertBefore(btn, clearBtn);
  });
}

function clearAll() {
  Object.keys(selected).forEach(k => delete selected[k]);
  heroSlots = [null, null, null, null];
  buildSidebar();
  buildToggleBar();
  updateHeroGauges();
}

// ============ HERO GAUGES ============
function updateHeroGauges() {
  for (let i = 0; i < 4; i++) {
    const cell = document.getElementById('hero-' + i);
    const key = heroSlots[i];
    if (!key || !selected[key]) {
      cell.className = 'gauge-cell empty';
      cell.innerHTML = '<div class="gauge-label">--</div><div class="gauge-value">-</div><div class="gauge-unit"></div>';
      continue;
    }
    const s = selected[key];
    const grp = SENSORS[s.group];
    const pid = grp.pids[s.pid];
    const pct = Math.max(0, Math.min(100, ((pid.val - s.min) / (s.max - s.min)) * 100));
    cell.className = 'gauge-cell';
    cell.innerHTML = `
      <div class="gauge-module-badge" style="background:${s.color};border-color:${s.color}44;width:8px;height:8px;border-radius:50%;padding:0"></div>
      <div class="gauge-label">${s.label}</div>
      <div class="gauge-value" style="color:${s.color}">${formatVal(pid.val)}</div>
      <div class="gauge-unit">${s.unit}</div>
      <div class="gauge-bar"><div class="gauge-bar-fill" style="width:${pct}%;background:${s.color}"></div></div>`;
  }
}

function formatVal(v) {
  if (typeof v === 'number') return v % 1 === 0 ? v : v.toFixed(1);
  return v;
}

// ============ K20Z3 SIMULATION ============
let simTime = 0;
let simGear = 0;
let simRPM = 850;
let simSpeed = 0;
let simThrottle = 0;
let simCamActual = 0;
let simCamCmd = 0;
let simVtec = 0;
let simKnockCount = 0;
let simPhase = 'idle'; // idle, pull, cruise, decel
let simPhaseTime = 0;

// K20Z3 gear ratios (Si 6-speed) — final drive 4.764
const K20_GEARS = [0, 3.267, 2.130, 1.517, 1.147, 0.921, 0.738];
const K20_FINAL = 4.764;
const TIRE_REV_PER_MILE = 819; // 215/45R17

function simUpdate() {
  simTime += 0.1;
  simPhaseTime += 0.1;
  const cycle = simTime % 40;

  // Phase state machine: idle -> pull -> cruise -> decel -> idle
  if (cycle < 5) {
    // Idle
    simPhase = 'idle';
    simThrottle = 0;
    simRPM = 850 + Math.sin(simTime * 3) * 25 + (Math.random() - 0.5) * 15;
    simGear = 0;
    simSpeed = 0;
  } else if (cycle < 20) {
    // WOT pull through gears
    simPhase = 'pull';
    simThrottle = 92 + Math.sin(simTime * 0.8) * 8;
    simRPM += simThrottle * 4.5;
    if (simGear === 0) simGear = 1;
    // Shift at 8100 RPM
    if (simRPM > 8100 && simGear < 6) {
      simGear++;
      // Drop RPM based on ratio change
      simRPM = simRPM * (K20_GEARS[simGear] / K20_GEARS[simGear - 1]);
    }
    if (simRPM > 8300) simRPM = 8300;
  } else if (cycle < 30) {
    // Cruise
    simPhase = 'cruise';
    simThrottle = 18 + Math.sin(simTime * 0.5) * 6;
    simRPM = 3200 + Math.sin(simTime * 0.3) * 300 + (Math.random() - 0.5) * 50;
    simGear = 6;
  } else if (cycle < 35) {
    // Decel / engine braking
    simPhase = 'decel';
    simThrottle = 0;
    simRPM = Math.max(850, simRPM - 350);
    if (simRPM < 2000 && simGear > 1) {
      simGear--;
      simRPM = 3000;
    }
    if (simRPM <= 900) simGear = 0;
  } else {
    // Back to idle
    simPhase = 'idle';
    simThrottle = 0;
    simRPM = 850 + Math.sin(simTime * 3) * 25;
    simGear = 0;
    simSpeed = 0;
  }

  // Speed from RPM and gear
  if (simGear > 0) {
    simSpeed = (simRPM / (K20_GEARS[simGear] * K20_FINAL)) * (60 / TIRE_REV_PER_MILE);
  } else {
    simSpeed = Math.max(0, simSpeed - 1.5);
  }
  simSpeed = Math.max(0, Math.min(160, simSpeed));

  // VTEC engagement at 5800 RPM
  const vtecTarget = simRPM >= 5800 ? 1 : 0;
  simVtec = vtecTarget;

  // VTC cam angle — command leads, actual lags behind
  simCamCmd = simRPM > 2000 ? Math.min(40, (simRPM - 2000) / 150) : 0;
  simCamActual += (simCamCmd - simCamActual) * 0.15; // lag

  // Knock simulation — occasional at high RPM/load
  const knockChance = simRPM > 7000 && simThrottle > 80 ? 0.08 : 0;
  const knockEvent = Math.random() < knockChance;
  if (knockEvent) simKnockCount++;

  // MAP sensor — vacuum at idle, positive at WOT
  const mapVal = simThrottle < 5 ? 30 + Math.random() * 4 :
    30 + simThrottle * 2.2 + (Math.random() - 0.5) * 5;

  // Throttle plate lags behind pedal
  const plateTarget = simThrottle * 0.95 + (simRPM > 5800 ? 3 : 0);

  // ENGINE sensors
  const eng = SENSORS.ENGINE.pids;
  eng.rpm.val = Math.round(simRPM);
  eng.map.val = Math.round(Math.min(255, Math.max(0, mapVal)));
  eng.tpedal.val = Math.round(simThrottle);
  eng.tplate.val = Math.round(Math.min(100, plateTarget));
  eng.vss.val = Math.round(simSpeed);
  eng.gear.val = simGear;

  // FUEL sensors
  const fuel = SENSORS.FUEL.pids;
  const injDur = simThrottle < 5 ? 2.1 + Math.random() * 0.3 :
    2.0 + (simRPM / 1000) * 2.5 + (simThrottle / 100) * 4;
  fuel.inj.val = parseFloat(injDur.toFixed(1));
  fuel.duty.val = Math.round(Math.min(95, (injDur / (120000 / simRPM / 2)) * 100));
  // AFR — stoich at cruise, rich at WOT, lean at decel
  const afrBase = simThrottle > 80 ? 11.8 + Math.random() * 0.4 :
    simThrottle < 3 && simRPM > 1200 ? 16.5 + Math.random() * 1.0 :
    14.68 + Math.sin(simTime * 2) * 0.15;
  fuel.afr.val = parseFloat(afrBase.toFixed(1));
  fuel.afm.val = parseFloat((0.5 + simThrottle * 0.04 + (simRPM / 9000) * 1.5).toFixed(2));
  fuel.strim.val = parseFloat((Math.sin(simTime * 1.5) * 3.5).toFixed(1));
  fuel.ltrim.val = parseFloat((Math.sin(simTime * 0.08) * 2.5 + 0.8).toFixed(1));
  fuel.fstat.val = simThrottle > 80 ? 4 : simRPM < 1000 ? 1 : 2;

  // IGNITION sensors
  const ign = SENSORS.IGNITION.pids;
  const baseAdv = 12 + (simRPM / 1000) * 3.5 - (simThrottle > 80 ? 3 : 0);
  const knockRetard = knockEvent ? 2 + Math.random() * 3 : 0;
  ign.ign.val = parseFloat((baseAdv - knockRetard + Math.sin(simTime) * 0.5).toFixed(1));
  ign.kcount.val = simKnockCount;
  ign.klevel.val = Math.round(knockEvent ? 30 + Math.random() * 40 : Math.max(0, ign.klevel.val - 2));
  ign.kretard.val = parseFloat(knockRetard.toFixed(1));

  // VTEC sensors
  const vtc = SENSORS.VTEC.pids;
  vtc.vts.val = simVtec;
  vtc.cam.val = parseFloat(simCamActual.toFixed(1));
  vtc.camcmd.val = parseFloat(simCamCmd.toFixed(1));

  // TEMP sensors
  const tmp = SENSORS.TEMPS.pids;
  tmp.ect.val = Math.round(185 + Math.sin(simTime * 0.04) * 8 + (simThrottle > 60 ? 5 : 0));
  tmp.iat.val = Math.round(85 + Math.sin(simTime * 0.07) * 6 + (simThrottle > 50 ? 3 : 0));

  // ELECTRICAL sensors
  const elec = SENSORS.ELECTRICAL.pids;
  elec.bat.val = parseFloat((12.4 + (simRPM > 1200 ? 1.8 : 0) + Math.sin(simTime * 0.2) * 0.2).toFixed(1));
  elec.pa.val = Math.round(101 + Math.sin(simTime * 0.01) * 0.5);

  // Push history for selected PIDs
  Object.entries(selected).forEach(([key, s]) => {
    const pid = SENSORS[s.group].pids[s.pid];
    s.history.push(pid.val);
    if (s.history.length > MAX_HISTORY) s.history.shift();
  });
}

// ============ GRAPH ============
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');

function resizeGraph() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
}
resizeGraph();
window.addEventListener('resize', resizeGraph);

function drawGraph() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#0a0000';
  ctx.fillRect(0, 0, W, H);

  const entries = Object.entries(selected).filter(([,s]) => s.visible && s.history.length >= 2);
  if (entries.length === 0) {
    ctx.fillStyle = '#ffffff0a';
    ctx.font = '12px Share Tech Mono';
    ctx.textAlign = 'center';
    ctx.fillText('SELECT PIDS TO BEGIN STREAMING', W / 2, H / 2);
    ctx.textAlign = 'start';
    return;
  }

  // Grid
  ctx.strokeStyle = '#ffffff08';
  ctx.lineWidth = 1;
  for (let i = 1; i < 5; i++) {
    const y = (i / 5) * H;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  const maxLen = Math.max(...entries.map(([,s]) => s.history.length));
  for (let i = 0; i < maxLen; i += 30) {
    const x = (i / Math.max(1, maxLen - 1)) * W;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }

  // Draw traces
  entries.forEach(([key, s]) => {
    const points = s.history.slice(-300);
    const len = points.length;

    ctx.beginPath();
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = s.color;
    ctx.shadowBlur = 4;
    ctx.setLineDash(s.dash || []);

    for (let i = 0; i < len; i++) {
      const x = (i / Math.max(1, len - 1)) * W;
      const norm = (points[i] - s.min) / (s.max - s.min);
      const y = H - (Math.max(0, Math.min(1, norm)) * (H - 20)) - 10;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.shadowBlur = 0;

    // Label
    const lastVal = points[len - 1];
    const lastNorm = (lastVal - s.min) / (s.max - s.min);
    const lastY = H - (Math.max(0, Math.min(1, lastNorm)) * (H - 20)) - 10;
    ctx.fillStyle = s.color;
    ctx.font = '9px Share Tech Mono';
    ctx.fillText(s.group + ':' + s.label + ' ' + formatVal(lastVal), W - 130, lastY - 4);
  });
}

// ============ BRIDGE (for Kotlin / FlashPro) ============
function updateFromOBD(grpKey, pidKey, value) {
  if (SENSORS[grpKey] && SENSORS[grpKey].pids[pidKey]) {
    SENSORS[grpKey].pids[pidKey].val = value;
  }
  document.getElementById('conn-dot').classList.add('connected');
  document.getElementById('conn-text').textContent = 'FLASHPRO CONNECTED';
}

// ============ MAIN LOOP ============
buildSidebar();

setInterval(simUpdate, 100);
requestAnimationFrame(function render() {
  updateHeroGauges();
  drawGraph();
  requestAnimationFrame(render);
});
</script>
