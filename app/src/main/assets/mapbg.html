<!DOCTYPE html>
<html>
<head>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
* { margin:0; padding:0; }
body { width:100vw; height:100vh; overflow:hidden; background:#0a0000; }
#map { position:fixed; top:0; left:0; width:100%; height:100%; }
.mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib { display:none !important; }
</style>
</head>
<body>
<div id="map"></div>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script>
mapboxgl.workerUrl = 'https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl-csp-worker.js';
mapboxgl.accessToken = 'pk.eyJ1IjoibWFya2hleW1hbm4iLCJhIjoiY21tejRoaXg5MDR4czJvcHp4YWF0bTg2byJ9.rla6beZVPZpv-ms6742DsQ';

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [-71.2368, 42.3762],
  zoom: 17.5,
  pitch: 60,
  bearing: 30,
  attributionControl: false,
  interactive: false,
  fadeDuration: 0,
});

map.on('load', () => {
  map.addLayer({
    id: '3d-buildings',
    source: 'composite',
    'source-layer': 'building',
    filter: ['==', 'extrude', 'true'],
    type: 'fill-extrusion',
    minzoom: 14,
    paint: {
      'fill-extrusion-color': [
        'interpolate', ['linear'], ['get', 'height'],
        0,   '#0d0000',
        50,  '#1a0000',
        100, '#220000'
      ],
      'fill-extrusion-height':  ['get', 'height'],
      'fill-extrusion-base':    ['get', 'min_height'],
      'fill-extrusion-opacity': 0.85,
    }
  });
});
</script>
</body>
</html>
