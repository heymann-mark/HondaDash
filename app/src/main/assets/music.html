<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="prod.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<script src="config.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100vw; height:100vh; overflow:hidden; font-family:'Inter',sans-serif; background:#121212; }

/* ============ HOME VIEW ============ */
.home-view {
  position:fixed; inset:0; bottom:72px; z-index:5;
  overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding:16px 16px 20px; background:#121212;
}
/* Top bar */
.home-top { display:flex; align-items:center; gap:10px; margin-bottom:14px; position:sticky; top:0; z-index:5; background:#121212; padding:4px 0 8px; }
.home-profile { width:32px; height:32px; border-radius:50%; background:#535353; color:#fff; font-size:14px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer; position:relative; }
.profile-menu { display:none; position:absolute; top:40px; left:0; background:#282828; border-radius:8px; box-shadow:0 8px 30px rgba(0,0,0,0.5); padding:12px 0; width:200px; z-index:50; }
.profile-menu.open { display:block; }
.profile-name { font-size:14px; font-weight:700; color:#fff; padding:4px 16px; }
.profile-email { font-size:11px; color:#888; padding:2px 16px 8px; }
.profile-divider { height:1px; background:#333; margin:4px 0; }
.profile-item { font-size:13px; color:#b3b3b3; padding:8px 16px; cursor:pointer; }
.profile-item:hover { color:#fff; background:#333; }
.home-pills { display:flex; gap:8px; overflow-x:auto; flex:1; }
.home-pills::-webkit-scrollbar { display:none; }
.home-pill { background:#282828; border:none; border-radius:20px; color:#fff; font-family:'Inter'; font-size:13px; font-weight:600; padding:8px 18px; cursor:pointer; white-space:nowrap; flex-shrink:0; }
.home-pill:hover { background:#333; }
.home-pill.active { background:#1DB954; color:#000; }

.home-section { margin-bottom:8px; }
.home-section-title { font-size:20px; font-weight:800; color:#fff; margin:20px 0 14px; }
.home-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:8px; margin-bottom:16px; }
.home-card {
  display:flex; align-items:center; background:#282828;
  border-radius:6px; overflow:hidden; cursor:pointer; transition:background 0.15s; height:56px;
}
.home-card:hover { background:#333; }
.home-card-art { width:56px; height:56px; object-fit:cover; flex-shrink:0; background:#333; }
.home-card-name { font-size:12px; font-weight:600; color:#fff; padding:0 10px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; line-height:1.3; }

.home-row { display:flex; gap:14px; overflow-x:auto; padding-bottom:8px; -webkit-overflow-scrolling:touch; }
.home-row::-webkit-scrollbar { display:none; }
.home-tile { flex-shrink:0; width:160px; cursor:pointer; }
.home-tile-art { width:160px; height:160px; border-radius:8px; object-fit:cover; background:#282828; }
.home-tile-name { font-size:13px; font-weight:700; color:#fff; margin-top:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.home-tile-sub { font-size:11px; color:#b3b3b3; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* Category grid */
.home-cat-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:10px; }

.home-cat-tile {
  flex-shrink:0; width:140px; height:100px; border-radius:8px; cursor:pointer;
  display:flex; align-items:flex-end; padding:10px; position:relative; overflow:hidden;
}
.home-cat-tile img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.home-cat-name { position:relative; z-index:1; font-size:14px; font-weight:700; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,0.6); }

.home-artist-tile { flex-shrink:0; width:120px; text-align:center; cursor:pointer; }
.home-artist-art { width:120px; height:120px; border-radius:50%; object-fit:cover; background:#282828; }
.home-artist-name { font-size:12px; font-weight:600; color:#fff; margin-top:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.home-artist-sub { font-size:10px; color:#b3b3b3; margin-top:2px; }

/* Search bar */
.search-wrap { margin-bottom:16px; }
.search-input {
  width:100%; background:#282828; border:none; border-radius:6px;
  color:#fff; font-family:'Inter'; font-size:14px; padding:10px 14px;
  outline:none;
}
.search-input::placeholder { color:#888; }
.search-results { margin-top:8px; }

/* ============ NOW PLAYING VIEW ============ */
.np-view {
  position:fixed; inset:0; z-index:20;
  transform:translateY(100%); transition:transform 0.35s ease;
  display:flex; flex-direction:column;
}
.np-view.open { transform:translateY(0); }

/* NP Background layers */
.np-bg { position:absolute; inset:0; overflow:hidden; }
.np-bg-deep { position:absolute; width:160%; height:160%; top:-30%; left:-30%; object-fit:cover; display:none; filter:blur(80px) brightness(0.4) saturate(2); animation:drift-deep 30s ease-in-out infinite alternate; }
.np-bg-mid { position:absolute; width:150%; height:150%; top:-25%; left:-25%; object-fit:cover; display:none; filter:blur(40px) brightness(0.4) saturate(1.8); animation:drift-mid 18s ease-in-out infinite alternate; opacity:0.8; }
.np-bg-front { position:absolute; width:130%; height:130%; top:-15%; left:-15%; object-fit:cover; display:none; filter:blur(8px) brightness(0.35) saturate(1.4); animation:drift-front 12s ease-in-out infinite alternate; opacity:0.6; }
.np-bg-grad { position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.25) 40%, rgba(0,0,0,0.85) 100%); }
@keyframes drift-deep { 0%{transform:scale(1) translate(0,0) rotate(0deg)} 33%{transform:scale(1.15) translate(5%,-3%) rotate(3deg)} 66%{transform:scale(1.08) translate(-4%,5%) rotate(-2deg)} 100%{transform:scale(1.12) translate(3%,-4%) rotate(1deg)} }
@keyframes drift-mid { 0%{transform:scale(1.05) translate(3%,2%) rotate(2deg)} 50%{transform:scale(1.12) translate(-4%,-3%) rotate(-2deg)} 100%{transform:scale(1) translate(2%,4%) rotate(1deg)} }
@keyframes drift-front { 0%{transform:scale(1) translate(0,0)} 33%{transform:scale(1.1) translate(4%,-2%)} 66%{transform:scale(1.05) translate(-3%,3%)} 100%{transform:scale(1.12) translate(2%,-3%)} }

/* NP Color pulse + particles */
.np-pulse { position:absolute; inset:0; pointer-events:none; opacity:0; transition:opacity 0.15s; }
.np-particles { position:absolute; inset:0; pointer-events:none; }

/* NP collapse button */
.np-collapse { position:absolute; top:16px; left:16px; z-index:25; background:none; border:none; color:#fff; font-size:28px; cursor:pointer; opacity:0.6; }
.np-collapse:hover { opacity:1; }

/* NP enable viz */
.np-viz-btn { position:absolute; top:16px; right:16px; z-index:25; background:rgba(0,0,0,0.4); border:1px solid #333; border-radius:20px; color:#b3b3b3; font-family:'Inter'; font-size:11px; font-weight:600; padding:6px 14px; cursor:pointer; }
.np-viz-btn:hover { color:#1DB954; border-color:#1DB954; }

/* NP Lyrics */
.np-lyrics {
  position:relative; z-index:10; flex:1; overflow-y:auto; overflow-x:hidden;
  padding:0 40px; -webkit-overflow-scrolling:touch;
}
.lyrics-line { font-size:28px; font-weight:800; color:rgba(255,255,255,0.1); line-height:1.6; transition:color 0.5s; padding:4px 0; }
.lyrics-line.active { color:#fff; }
.lyrics-line.near { color:rgba(255,255,255,0.25); }
.lyrics-line.past { color:rgba(255,255,255,0.05); }
.lyrics-none { font-size:16px; font-weight:600; color:rgba(255,255,255,0.12); text-align:center; }

/* NP Visualizer bar */
.np-viz-bar { position:relative; z-index:10; height:60px; pointer-events:none; }

/* NP Controls */
.np-controls {
  position:relative; z-index:10; padding:0 24px 20px;
  background:linear-gradient(transparent, rgba(0,0,0,0.8));
}
.np-track-row { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
.np-track-art { width:52px; height:52px; border-radius:6px; object-fit:cover; display:none; }
.np-track-meta { flex:1; overflow:hidden; }
.np-track-name { font-size:16px; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.np-track-artist { font-size:12px; color:#b3b3b3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.np-progress { width:100%; height:3px; background:#4d4d4d; border-radius:2px; cursor:pointer; margin-bottom:4px; }
.np-progress-fill { height:3px; background:#1DB954; border-radius:2px; width:0%; }
.np-times { display:flex; justify-content:space-between; font-size:10px; color:#888; margin-bottom:12px; }
.np-btns { display:flex; align-items:center; justify-content:center; gap:28px; }
.np-btn { background:none; border:none; color:#b3b3b3; cursor:pointer; font-size:22px; }
.np-btn:hover { color:#fff; }
.np-btn.play { width:46px; height:46px; background:#fff; border-radius:50%; color:#000; font-size:20px; display:flex; align-items:center; justify-content:center; }
.np-vol { display:flex; align-items:center; gap:8px; margin-top:10px; }
.np-vol-icon { color:#b3b3b3; font-size:14px; cursor:pointer; }
.np-vol-slider { flex:1; -webkit-appearance:none; height:3px; background:#4d4d4d; border-radius:2px; outline:none; }
.np-vol-slider::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; border-radius:50%; background:#fff; cursor:pointer; }

/* ============ MINI PLAYER BAR ============ */
.mini-player {
  position:fixed; bottom:0; left:0; right:0; height:72px;
  z-index:15; background:#282828; border-top:1px solid #333;
  display:none; cursor:pointer;
}
.mini-inner { display:flex; align-items:center; height:100%; padding:0 12px; gap:10px; }
.mini-art { width:48px; height:48px; border-radius:4px; object-fit:cover; background:#333; display:none; }
.mini-meta { flex:1; overflow:hidden; }
.mini-name { font-size:14px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mini-artist { font-size:11px; color:#b3b3b3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mini-vol { -webkit-appearance:none; width:70px; height:3px; background:#4d4d4d; border-radius:2px; outline:none; flex-shrink:0; }
.mini-vol::-webkit-slider-thumb { -webkit-appearance:none; width:10px; height:10px; border-radius:50%; background:#fff; cursor:pointer; }
.mini-btn { background:none; border:none; color:#fff; font-size:24px; cursor:pointer; padding:8px; }
.mini-progress { position:absolute; top:0; left:0; right:0; height:2px; background:#4d4d4d; }
.mini-progress-fill { height:2px; background:#1DB954; width:0%; }

/* ============ LOGIN ============ */
.login-screen { position:fixed; inset:0; z-index:50; background:#121212; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; }
.login-title { font-size:28px; font-weight:800; color:#fff; }
.login-sub { font-size:14px; color:#888; text-align:center; line-height:1.6; }
.login-btn { background:#1DB954; border:none; color:#000; font-family:'Inter'; font-size:15px; font-weight:700; padding:14px 40px; border-radius:30px; cursor:pointer; }
.login-btn:hover { background:#1ed760; }
</style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="login-screen">
  <div class="login-title">HondaDash Music</div>
  <div class="login-sub">Connect your Spotify Premium</div>
  <button class="login-btn" onclick="spotifyLogin()">CONNECT SPOTIFY</button>
</div>

<!-- Home View -->
<div class="home-view" id="home-view" style="display:none">

  <!-- Top bar: profile + pills -->
  <div class="home-top">
    <div class="home-profile" id="home-profile" onclick="toggleProfile()">M</div>
    <div class="profile-menu" id="profile-menu">
      <div class="profile-name" id="profile-name">--</div>
      <div class="profile-email" id="profile-email">--</div>
      <div class="profile-divider"></div>
      <div class="profile-item" onclick="localStorage.clear();spotifyLogin()">Switch account</div>
      <div class="profile-item" onclick="localStorage.clear();location.reload()">Log out</div>
    </div>
    <div class="home-pills">
      <button class="home-pill active" data-filter="all">All</button>
      <button class="home-pill" data-filter="music">Music</button>
      <button class="home-pill" data-filter="podcasts">Podcasts</button>
      <button class="home-pill" data-filter="audiobooks">Audiobooks</button>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <input class="search-input" id="home-search" type="text" placeholder="What do you want to listen to?" oninput="homeSearch(this.value)">
  </div>
  <div class="search-results" id="search-results" style="display:none"></div>

  <div id="home-content">
    <!-- Quick play grid -->
    <div class="home-grid" id="recent-grid"></div>

    <!-- Featured / New Music Friday -->
    <div class="home-section" id="sec-featured">
      <div class="home-section-title" id="featured-title">New Music Friday</div>
      <div class="home-row" id="featured-row"></div>
    </div>

    <!-- Recently Played -->
    <div class="home-section" id="sec-recent">
      <div class="home-section-title">Recently played</div>
      <div class="home-row" id="recent-row"></div>
    </div>

    <!-- Your Top Mixes -->
    <div class="home-section" id="sec-playlists">
      <div class="home-section-title">Your playlists</div>
      <div class="home-row" id="playlists-row"></div>
    </div>

    <!-- Made For You -->
    <div class="home-section" id="sec-top">
      <div class="home-section-title">Your heavy rotation</div>
      <div class="home-row" id="top-tracks-row"></div>
    </div>

    <!-- Your Top Artists -->
    <div class="home-section" id="sec-artists">
      <div class="home-section-title">Your top artists</div>
      <div class="home-row" id="top-artists-row"></div>
    </div>

    <!-- Browse -->
    <div class="home-section" id="sec-browse">
      <div class="home-section-title">Browse all</div>
      <div class="home-cat-grid" id="categories-grid"></div>
    </div>

    <!-- New Releases -->
    <div class="home-section" id="sec-new">
      <div class="home-section-title">New releases for you</div>
      <div class="home-row" id="new-releases-row"></div>
    </div>

    <!-- Liked -->
    <div class="home-section" id="sec-liked">
      <div class="home-section-title">Your liked songs</div>
      <div class="home-row" id="liked-row"></div>
    </div>

    <div style="height:90px"></div>
  </div>
</div>

<!-- Now Playing View -->
<div class="np-view" id="np-view">
  <div class="np-bg">
    <img class="np-bg-deep" id="bg-deep" src="">
    <img class="np-bg-mid" id="bg-mid" src="">
    <img class="np-bg-front" id="bg-front" src="">
    <div class="np-bg-grad"></div>
  </div>
  <div class="np-pulse" id="bg-pulse"></div>
  <canvas class="np-particles" id="bg-particles"></canvas>

  <button class="np-collapse" onclick="closeNP()">&#8964;</button>
  <button class="np-viz-btn" id="viz-prompt" onclick="enableViz()">ENABLE VIZ</button>

  <div class="np-lyrics" id="lyrics-view">
    <div class="lyrics-none">Play a song to see lyrics</div>
  </div>

  <canvas class="np-viz-bar" id="viz" height="60"></canvas>

  <div class="np-controls">
    <div class="np-track-row">
      <img class="np-track-art" id="track-art" src="">
      <div class="np-track-meta">
        <div class="np-track-name" id="track-name">Not Playing</div>
        <div class="np-track-artist" id="track-artist">--</div>
      </div>
    </div>
    <div class="np-progress" onclick="seekTo(event)">
      <div class="np-progress-fill" id="progress-fill"></div>
    </div>
    <div class="np-times">
      <span id="time-cur">0:00</span>
      <span id="time-dur">0:00</span>
    </div>
    <div class="np-btns">
      <button class="np-btn" onclick="spPrev()">&#9198;</button>
      <button class="np-btn play" id="btn-play" onclick="spToggle()">&#9654;</button>
      <button class="np-btn" onclick="spNext()">&#9197;</button>
    </div>
    <div class="np-vol">
      <span class="np-vol-icon" onclick="toggleMute()">&#128264;</span>
      <input type="range" class="np-vol-slider" id="vol-slider" min="0" max="100" value="100" oninput="setVolume(this.value)">
    </div>
  </div>
</div>

<!-- Mini Player -->
<div class="mini-player" id="mini-player" onclick="openNP(event)">
  <div class="mini-progress"><div class="mini-progress-fill" id="mini-progress-fill"></div></div>
  <div class="mini-inner">
    <img class="mini-art" id="mini-art" src="">
    <div class="mini-meta">
      <div class="mini-name" id="mini-name">Not Playing</div>
      <div class="mini-artist" id="mini-artist">--</div>
    </div>
    <input type="range" class="mini-vol" id="mini-vol" min="0" max="100" value="100" onclick="event.stopPropagation()" oninput="setVolume(this.value)">
    <button class="mini-btn" id="mini-play" onclick="event.stopPropagation();spToggle()">&#9654;</button>
  </div>
</div>

<script>
// ============ AUTH ============
const CLIENT_ID=SPOTIFY_CLIENT_ID;
const REDIRECT_URI='http://127.0.0.1:8000/index.html';
const SCOPES='streaming user-read-email user-read-private user-read-playback-state user-modify-playback-state user-read-currently-playing user-library-read playlist-read-private user-read-recently-played user-top-read';
let accessToken=null;

function generateCodeVerifier(){const a=new Uint8Array(64);crypto.getRandomValues(a);return btoa(String.fromCharCode(...a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
async function generateCodeChallenge(v){const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
async function spotifyLogin(){const v=generateCodeVerifier();localStorage.setItem('spotify_verifier',v);const c=await generateCodeChallenge(v);window.top.location='https://accounts.spotify.com/authorize?'+new URLSearchParams({client_id:CLIENT_ID,response_type:'code',redirect_uri:REDIRECT_URI,scope:SCOPES,code_challenge_method:'S256',code_challenge:c});}
async function handleCallback(){const code=new URLSearchParams(window.location.search).get('code');if(!code)return false;const res=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({client_id:CLIENT_ID,grant_type:'authorization_code',code,redirect_uri:REDIRECT_URI,code_verifier:localStorage.getItem('spotify_verifier')})});const data=await res.json();if(data.access_token){accessToken=data.access_token;localStorage.setItem('spotify_token',accessToken);window.history.replaceState({},'',window.location.pathname);return true;}return false;}
async function spAPI(ep,method='GET',body=null){if(!accessToken)return null;const opts={method,headers:{'Authorization':'Bearer '+accessToken}};if(body){opts.body=JSON.stringify(body);opts.headers['Content-Type']='application/json';}const res=await fetch('https://api.spotify.com/v1'+ep,opts);if(res.status===204)return{};if(res.status===401){accessToken=null;localStorage.removeItem('spotify_token');return null;}if(!res.ok)return null;return res.json();}

// ============ PLAYBACK SDK ============
let player=null,deviceId=null,isPlaying=false,currentTrackId=null,sdkReady=false;
let currentPosition=0,trackDuration=0;
let currentImgUrl=null;

window.onSpotifyWebPlaybackSDKReady=()=>{sdkReady=true;tryInitPlayer();};

function tryInitPlayer(){
  if(!sdkReady||!accessToken||player)return;
  player=new Spotify.Player({name:'HondaDash',getOAuthToken:cb=>cb(accessToken),volume:1.0});
  player.addListener('ready',({device_id})=>{
    deviceId=device_id;
    fetch('https://api.spotify.com/v1/me/player',{method:'PUT',headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({device_ids:[device_id],play:true})}).then(r=>{if(r.status===404)fetch('https://api.spotify.com/v1/me/player/play?device_id='+device_id,{method:'PUT',headers:{'Authorization':'Bearer '+accessToken}});setTimeout(pollPlayerState,1500);setTimeout(pollPlayerState,4000);});
  });
  player.addListener('player_state_changed',handleState);
  player.addListener('authentication_error',()=>{});
  player.connect();
}

function handleState(state){
  if(!state)return;
  isPlaying=!state.paused;
  document.getElementById('btn-play').innerHTML=isPlaying?'&#10074;&#10074;':'&#9654;';
  document.getElementById('mini-play').innerHTML=isPlaying?'&#10074;&#10074;':'&#9654;';
  const track=state.track_window.current_track;
  if(track)updateTrack(track);
  if(state.position!==undefined&&state.duration){currentPosition=state.position;trackDuration=state.duration;updateProgress();}
}

function updateTrack(track){
  const changed=currentTrackId!==track.id;
  currentTrackId=track.id;
  const name=track.name;
  const artist=track.artists.map(a=>a.name).join(', ');

  // Now playing
  document.getElementById('track-name').textContent=name;
  document.getElementById('track-artist').textContent=artist;
  // Mini player
  document.getElementById('mini-name').textContent=name;
  document.getElementById('mini-artist').textContent=artist;
  document.getElementById('mini-player').style.display='block';

  const img=track.album.images[0];
  if(img){
    currentImgUrl=img.url;
    document.getElementById('track-art').src=img.url;document.getElementById('track-art').style.display='block';
    document.getElementById('mini-art').src=img.url;document.getElementById('mini-art').style.display='block';
    ['bg-deep','bg-mid','bg-front'].forEach(id=>{const el=document.getElementById(id);el.src=img.url;el.style.display='block';});
  }
  if(changed) fetchLyrics(track.artists[0].name,track.name);
}

function updateProgress(){
  if(!trackDuration)return;
  const pct=((currentPosition/trackDuration)*100)+'%';
  document.getElementById('progress-fill').style.width=pct;
  document.getElementById('mini-progress-fill').style.width=pct;
  document.getElementById('time-cur').textContent=fmtTime(currentPosition/1000);
  document.getElementById('time-dur').textContent=fmtTime(trackDuration/1000);
}
function fmtTime(s){s=Math.floor(s);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}

function toggleProfile(){document.getElementById('profile-menu').classList.toggle('open');}

let audioCtx,analyser,freqData,audioSource='none';
function initAnalyser(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(!analyser){analyser=audioCtx.createAnalyser();analyser.fftSize=2048;analyser.smoothingTimeConstant=0.4;analyser.minDecibels=-90;analyser.maxDecibels=-10;freqData=new Uint8Array(analyser.frequencyBinCount);}}

async function enableViz(){
  const btn=document.getElementById('viz-prompt');
  const els=document.querySelectorAll('audio');
  for(const el of els){try{initAnalyser();const s=audioCtx.createMediaElementSource(el);s.connect(analyser);analyser.connect(audioCtx.destination);audioSource='element';btn.style.display='none';return;}catch(e){}}
  for(const el of els){try{const st=el.captureStream?el.captureStream():null;if(st&&st.getAudioTracks().length){initAnalyser();audioCtx.createMediaStreamSource(st).connect(analyser);audioSource='capture';btn.style.display='none';return;}}catch(e){}}
  try{btn.textContent='SELECT TAB + SHARE AUDIO';const st=await navigator.mediaDevices.getDisplayMedia({video:{displaySurface:'browser'},audio:true,preferCurrentTab:true});st.getVideoTracks().forEach(t=>t.stop());const at=st.getAudioTracks();if(at.length){initAnalyser();audioCtx.createMediaStreamSource(new MediaStream(at)).connect(analyser);audioSource='tab';btn.style.display='none';return;}}catch(e){}
  try{const st=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false});initAnalyser();audioCtx.createMediaStreamSource(st).connect(analyser);audioSource='mic';btn.style.display='none';return;}catch(e){}
  btn.textContent='COULD NOT CAPTURE';
}

// ============ VISUALIZER ============
const canvas=document.getElementById('viz');
const ctx=canvas.getContext('2d');
let smoothBars=new Float32Array(64).fill(0);
function resizeCanvas(){canvas.width=canvas.parentElement?.offsetWidth||window.innerWidth;canvas.height=60;}
resizeCanvas();window.addEventListener('resize',resizeCanvas);

function getFreqBars(count){
  if(!analyser||!freqData)return new Float32Array(count).fill(0);
  analyser.getByteFrequencyData(freqData);
  const len=freqData.length,out=new Float32Array(count),logMin=Math.log(1),logMax=Math.log(len);
  for(let i=0;i<count;i++){const lo=Math.max(0,Math.floor(Math.exp(logMin+(logMax-logMin)*(i/count)))),hi=Math.max(lo+1,Math.min(len,Math.floor(Math.exp(logMin+(logMax-logMin)*((i+1)/count)))));let sum=0;for(let j=lo;j<hi;j++)sum+=freqData[j];out[i]=Math.min(1,(sum/(hi-lo))/255);}
  return out;
}

function drawViz(){
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const count=48,raw=getFreqBars(count),barW=(W/count)-1;
  for(let i=0;i<count;i++){
    smoothBars[i]+=(raw[i]-smoothBars[i])*0.7;
    const val=smoothBars[i],h=val*H;
    const hue=220+(i/count)*100;
    ctx.fillStyle=`hsla(${hue},80%,${25+val*35}%,${0.4+val*0.4})`;
    ctx.fillRect(i*(barW+1),H-h,barW,h);
  }
  requestAnimationFrame(drawViz);
}

// ============ PARTICLES ============
const pCanvas=document.getElementById('bg-particles');
const pCtx=pCanvas.getContext('2d');
const particles=[];
function resizeP(){pCanvas.width=pCanvas.parentElement?.offsetWidth||window.innerWidth;pCanvas.height=pCanvas.parentElement?.offsetHeight||window.innerHeight;}
resizeP();window.addEventListener('resize',resizeP);
for(let i=0;i<80;i++)particles.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*5+2,vx:(Math.random()-0.5)*0.8,vy:-Math.random()*0.8-0.3,alpha:Math.random()*0.5+0.2,hue:220+Math.random()*100});

function drawParticles(){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  let energy=0;
  if(analyser&&freqData){analyser.getByteFrequencyData(freqData);for(let i=0;i<20;i++)energy+=freqData[i];energy=(energy/20)/255;}
  const pulse=document.getElementById('bg-pulse');
  if(energy>0.15){const intensity=(energy-0.15)*2;pulse.style.opacity=Math.min(1,intensity);const hue=220+energy*120;const t=Date.now();const px=30+Math.sin(t*0.0008)*25;const py=35+Math.cos(t*0.0006)*25;pulse.style.background=`radial-gradient(ellipse 80% 60% at ${px}% ${py}%, hsla(${hue},80%,45%,${intensity*0.4}), transparent 70%),radial-gradient(ellipse 60% 80% at ${100-px}% ${100-py}%, hsla(${hue+60},70%,35%,${intensity*0.25}), transparent 60%)`;}else{pulse.style.opacity='0';}
  for(const p of particles){p.x+=p.vx+energy*(Math.random()-0.5)*2;p.y+=p.vy-energy*0.5;if(p.y<-10){p.y=pCanvas.height+10;p.x=Math.random()*pCanvas.width;}if(p.x<-10)p.x=pCanvas.width+10;if(p.x>pCanvas.width+10)p.x=-10;const size=p.r+energy*6;const alpha=p.alpha+energy*0.5;pCtx.beginPath();pCtx.arc(p.x,p.y,size*3,0,Math.PI*2);pCtx.fillStyle=`hsla(${p.hue},70%,60%,${alpha*0.15})`;pCtx.fill();pCtx.beginPath();pCtx.arc(p.x,p.y,size,0,Math.PI*2);pCtx.fillStyle=`hsla(${p.hue},70%,70%,${alpha})`;pCtx.fill();}
  requestAnimationFrame(drawParticles);
}
drawParticles();

// ============ LYRICS ============
let lyricsLines=[],lyricsTimestamps=[];

async function fetchLyrics(artist,title){
  const view=document.getElementById('lyrics-view');
  view.innerHTML='<div class="lyrics-none">Loading lyrics...</div>';
  lyricsLines=[];lyricsTimestamps=[];
  try{
    const res=await fetch(`https://lrclib.net/api/get?artist_name=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(title)}`);
    if(res.ok){const data=await res.json();if(data.syncedLyrics){parseSynced(data.syncedLyrics);return;}if(data.plainLyrics){parsePlain(data.plainLyrics);return;}}
  }catch(e){}
  view.innerHTML='<div class="lyrics-none">No lyrics available</div>';
}

function parseSynced(lrc){
  lyricsLines=[];lyricsTimestamps=[];
  for(const line of lrc.split('\n')){const m=line.match(/\[(\d+):(\d+)\.(\d+)\]\s*(.*)/);if(m){const ms=(parseInt(m[1])*60+parseInt(m[2]))*1000+parseInt(m[3])*10;const txt=m[4].trim();if(txt){lyricsTimestamps.push(ms);lyricsLines.push(txt);}}}
  renderLyrics();
}
function parsePlain(text){const lines=text.split('\n').filter(l=>l.trim());lyricsLines=lines;lyricsTimestamps=lines.map((_,i)=>(i/lines.length)*trackDuration);renderLyrics();}
function renderLyrics(){document.getElementById('lyrics-view').innerHTML='<div style="height:50vh"></div>'+lyricsLines.map((l,i)=>`<div class="lyrics-line" id="lyric-${i}">${l}</div>`).join('')+'<div style="height:50vh"></div>';}

function updateLyrics(){
  if(!lyricsLines.length)return;
  const ahead=currentPosition+1200;
  let active=0;for(let i=0;i<lyricsTimestamps.length;i++)if(ahead>=lyricsTimestamps[i])active=i;
  for(let i=0;i<lyricsLines.length;i++){const el=document.getElementById('lyric-'+i);if(!el)continue;el.classList.remove('active','near','past');if(i===active)el.classList.add('active');else if(i>active&&i<=active+2)el.classList.add('near');else if(i<active)el.classList.add('past');}
  const activeEl=document.getElementById('lyric-'+active);
  if(activeEl){const view=document.getElementById('lyrics-view');view.scrollTo({top:activeEl.offsetTop-view.offsetHeight/2+activeEl.offsetHeight/2,behavior:'smooth'});}
}

setInterval(()=>{if(isPlaying){currentPosition+=200;updateProgress();updateLyrics();}},200);

async function playTrack(uri){
  if(!deviceId)return;
  // First ensure device is active
  await fetch('https://api.spotify.com/v1/me/player',{method:'PUT',headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({device_ids:[deviceId]})}).catch(()=>{});
  // Then play
  const res=await fetch('https://api.spotify.com/v1/me/player/play?device_id='+deviceId,{method:'PUT',headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({uris:[uri],position_ms:VIZ_DELAY_MS})});
  if(res.status===403){
    // Try through SDK instead
    console.log('Play API failed, trying direct URI');
    await spAPI('/me/player/queue?uri='+encodeURIComponent(uri),'POST');
    player&&player.nextTrack();
  }
}
async function playContext(uri){
  if(!deviceId)return;
  await fetch('https://api.spotify.com/v1/me/player',{method:'PUT',headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({device_ids:[deviceId]})}).catch(()=>{});
  const res=await fetch('https://api.spotify.com/v1/me/player/play?device_id='+deviceId,{method:'PUT',headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({context_uri:uri,position_ms:VIZ_DELAY_MS})});
  if(res.status===403){
    console.log('PlayContext API failed 403');
  }
}

// ============ INIT ============
function showPlayer(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('home-view').style.display='block';
  tryInitPlayer();
  loadHome();
}

async function init(){
  const code=new URLSearchParams(window.location.search).get('code');
  if(code){const ok=await handleCallback();if(ok){showPlayer();drawViz();return;}}
  const stored=localStorage.getItem('spotify_token');
  if(stored){accessToken=stored;const me=await spAPI('/me');if(me){showPlayer();drawViz();return;}localStorage.removeItem('spotify_token');}
  drawViz();
}
init();
const s=document.createElement('script');s.src='https://sdk.scdn.co/spotify-player.js';document.body.appendChild(s);
</script>
