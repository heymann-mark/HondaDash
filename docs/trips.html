<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0000; width:100vw; height:100vh; overflow:hidden; font-family:'Share Tech Mono',monospace; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.demo-title { font-family:'Orbitron',monospace; font-size:18px; color:#cc2200; letter-spacing:3px; margin-bottom:12px; }
.demo-sub { font-size:13px; color:#ffffff33; letter-spacing:2px; text-align:center; line-height:1.8; }
.demo-features { margin-top:20px; text-align:left; }
.demo-features div { font-size:11px; color:#ffffff22; letter-spacing:1px; padding:4px 0; }
.demo-features span { color:#cc220088; }
</style>
</head>
<body>
<div class="demo-title">TRIPS</div>
<div class="demo-sub">Trip recording and history<br>Requires Mapbox API key</div>
<div class="demo-features">
  <div><span>></span> Auto-start/stop recording by speed</div>
  <div><span>></span> GPS path tracking on map</div>
  <div><span>></span> Distance, time, top speed, max RPM</div>
  <div><span>></span> Trip history with map thumbnails</div>
  <div><span>></span> Export to CSV</div>
</div>
</body>
</html>
